<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caja del día · GP Dermatología</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --crema:#f4efe7; --crema2:#fbf8f2; --verde:#1f3d34; --verde2:#2c5446;
    --tinta:#26201a; --suave:#8a8076; --linea:#e3dccf;
    --ok:#2f7d5b; --mal:#b23b3b; --esp:#b8860b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--crema);color:var(--tinta);font-family:'Inter',system-ui,sans-serif;
    line-height:1.5;padding:20px 16px 50px;display:flex;justify-content:center}
  .wrap{max-width:640px;width:100%}
  h1{font-family:'Playfair Display',serif;font-weight:600;color:var(--verde);font-size:26px;margin:0}
  .sub{color:var(--suave);font-size:13.5px;margin:0 0 16px}

  .controles{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
  .modo{display:flex;background:var(--crema2);border:1px solid var(--linea);border-radius:11px;overflow:hidden}
  .modo button{font-family:inherit;font-size:13.5px;font-weight:600;padding:9px 16px;border:none;
    background:transparent;color:var(--suave);cursor:pointer}
  .modo button.on{background:var(--verde);color:#fff}
  input[type=date]{font-family:inherit;font-size:14px;padding:8px 11px;border:1px solid var(--linea);
    border-radius:10px;background:#fff;color:var(--tinta)}
  .sp{flex:1}
  button.ghost{font-family:inherit;font-size:12.5px;font-weight:600;border-radius:9px;padding:8px 12px;
    border:1px solid var(--verde);background:transparent;color:var(--verde);cursor:pointer}

  .emp-card{background:var(--crema2);border:1px solid var(--linea);border-radius:16px;padding:18px 20px;margin-bottom:16px}
  .emp-h{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
  .emp-n{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--verde)}
  .emp-t{font-size:11px;color:var(--suave);text-transform:uppercase;letter-spacing:.06em}
  .emp-bruto{margin-left:auto;font-family:ui-monospace,monospace;font-size:18px;font-weight:600}

  .medios{border:1px solid var(--linea);border-radius:11px;overflow:hidden;margin-bottom:14px}
  .mrow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-size:14px;border-bottom:1px solid var(--linea)}
  .mrow:last-child{border-bottom:none}
  .mrow .ml{display:flex;align-items:center;gap:9px}
  .mrow .mdot{width:9px;height:9px;border-radius:50%}
  .mrow .mn{font-weight:500}
  .mrow .mc{color:var(--suave);font-size:12px}
  .mrow .mv{font-family:ui-monospace,monospace}
  .mrow.tot{background:#f6f1e8;font-weight:600}

  .bloque-t{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--suave);margin:4px 0 10px}
  .ef{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
  .campo{flex:1;min-width:130px;display:flex;flex-direction:column;gap:4px}
  .campo label{font-size:11.5px;color:var(--suave);font-weight:500}
  .campo input{font-family:ui-monospace,monospace;font-size:15px;padding:9px 11px;border:1px solid var(--linea);
    border-radius:9px;background:#fff;color:var(--tinta)}
  .campo .ro{background:#f3efe6;color:var(--suave)}
  button.save{font-family:inherit;font-size:13.5px;font-weight:600;border-radius:10px;padding:10px 16px;
    border:1px solid var(--verde);background:var(--verde);color:#fff;cursor:pointer}
  button.save:active{background:var(--verde2)}

  .resumen{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .kpi{flex:1;min-width:120px;background:#fff;border:1px solid var(--linea);border-radius:11px;padding:11px 13px}
  .kpi .kl{font-size:10.5px;color:var(--suave);text-transform:uppercase;letter-spacing:.05em}
  .kpi .kv{font-family:ui-monospace,monospace;font-size:17px;font-weight:600;margin-top:2px}

  .alerta{font-size:13px;border-radius:10px;padding:10px 13px;margin-bottom:12px;line-height:1.5}
  .alerta.ok{background:#eaf3ee;color:var(--ok);border:1px solid #cfe6da}
  .alerta.warn{background:#f6ece1;color:#8a5a13;border:1px solid #e8d6bd}
  .alerta.bad{background:#f6e9e9;color:var(--mal);border:1px solid #e7cccc}

  .cobro{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--linea);font-size:13.5px}
  .cobro:last-child{border-bottom:none}
  .cobro .cp{flex:1;min-width:0}
  .cobro .cp .cr{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--suave)}
  .cobro .cmonto{font-family:ui-monospace,monospace;font-weight:600}
  .cobro input{width:92px;font-family:ui-monospace,monospace;font-size:13px;padding:6px 8px;border:1px solid var(--linea);border-radius:8px}
  .cobro button{font-size:12px;font-weight:600;border-radius:8px;padding:6px 10px;border:1px solid var(--verde);background:transparent;color:var(--verde);cursor:pointer}
  .cobro.done button{background:var(--ok);color:#fff;border-color:var(--ok)}
  .cobro .tagm{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--suave)}

  .cerrar{margin-top:14px;width:100%;font-family:inherit;font-size:14px;font-weight:600;border-radius:11px;
    padding:13px;border:1px solid var(--verde);background:var(--verde);color:#fff;cursor:pointer}
  .cerrado{margin-top:14px;text-align:center;font-size:13px;color:var(--ok);background:#eaf3ee;border:1px solid #cfe6da;border-radius:11px;padding:11px}

  .vacio{text-align:center;color:var(--suave);padding:20px;font-size:13px}
  details.debug{margin-top:20px;border-top:1px solid var(--linea);padding-top:14px}
  details.debug summary{cursor:pointer;color:var(--suave);font-size:13px}
  .dbtns{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
  .dbtns button{font-size:12px;border-radius:8px;padding:7px 11px;border:1px solid var(--linea);background:#fff;color:var(--verde);cursor:pointer}
  .dbtns button.del{color:var(--mal);border-color:#e7cccc}
  #log{font-family:ui-monospace,monospace;font-size:12px;background:#fffdf9;border:1px solid var(--linea);
    border-radius:10px;padding:11px;max-height:160px;overflow:auto;white-space:pre-wrap}
  .l-ok{color:var(--ok)} .l-mal{color:var(--mal)} .l-dim{color:var(--suave)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Caja del día</h1>
  <p class="sub">Ingresos por empresa y medio · cierre y conciliación</p>

  <div class="controles">
    <div class="modo">
      <button id="m-clarita" class="on" onclick="setModo('clarita')">Clarita · registro</button>
      <button id="m-andrea" onclick="setModo('andrea')">Andrea · conciliación</button>
    </div>
    <input type="date" id="fecha" onchange="cargar()">
    <span class="sp"></span>
    <button class="ghost" onclick="cargar()">Refrescar</button>
  </div>

  <div id="cont"></div>

  <details class="debug">
    <summary>Herramientas de prueba</summary>
    <div class="dbtns">
      <button onclick="pruebaCobros()">+ Cobros de ejemplo (hoy)</button>
      <button class="del" onclick="limpiarPrueba()">Limpiar pruebas</button>
    </div>
    <div id="log"></div>
  </details>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://nirxkzkfcctdigvuapuc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pcnhremtmY2N0ZGlndnVhcHVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDY5MTUsImV4cCI6MjA5NTEyMjkxNX0.iGTkHTRgdsEDoUsvS9ApQtSRAJV52z-_IASlFBmPqDM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = id => document.getElementById(id);
const clp = n => '$' + (n||0).toLocaleString('es-CL');
function log(m,c){ const d=$('log'); const t=new Date().toLocaleTimeString('es-CL');
  const s=document.createElement('div'); if(c)s.className=c; s.textContent='['+t+'] '+m; d.appendChild(s); d.scrollTop=d.scrollHeight; }

const EMPRESAS = [ {id:1, nombre:'SkinTouch SpA', corto:'SkinTouch'}, {id:2, nombre:'LaserTouch Ltda.', corto:'LaserTouch'} ];
const MEDIOS = [
  { key:'webpay',        label:'WebPay',        color:'#2f7d5b', tarjeta:true  },
  { key:'pos',           label:'POS',           color:'#b8860b', tarjeta:true  },
  { key:'transferencia', label:'Transferencia', color:'#4a6b8a', tarjeta:false },
  { key:'efectivo',      label:'Efectivo',      color:'#8a8076', tarjeta:false }
];
function normMedio(m){
  const s=(m||'').toLowerCase();
  if(s.indexOf('webpay')>=0||s.indexOf('web pay')>=0) return 'webpay';
  if(s.indexOf('pos')>=0||s.indexOf('tarjeta')>=0) return 'pos';
  if(s.indexOf('transf')>=0) return 'transferencia';
  if(s.indexOf('efect')>=0||s.indexOf('cash')>=0) return 'efectivo';
  return 'otro';
}
function medioInfo(k){ return MEDIOS.find(x=>x.key===k) || {key:k,label:k||'Otro',color:'#8a8076',tarjeta:false}; }

let MODO = 'clarita';
let COBROS = [];           // cobros del día seleccionado
let CIERRES = {};          // cierres_caja por empresa_id

function diaSantiago(iso){ return new Date(iso).toLocaleDateString('en-CA', {timeZone:'America/Santiago'}); }
function hoySantiago(){ return new Date().toLocaleDateString('en-CA', {timeZone:'America/Santiago'}); }

function setModo(m){
  MODO=m;
  $('m-clarita').classList.toggle('on', m==='clarita');
  $('m-andrea').classList.toggle('on', m==='andrea');
  render();
}

async function cargar(){
  const fecha = $('fecha').value || hoySantiago();
  $('fecha').value = fecha;
  // ventana UTC amplia que cubre el día de Santiago, luego se filtra exacto
  const base = new Date(fecha + 'T00:00:00Z').getTime();
  const desde = new Date(base - 24*3600*1000).toISOString();
  const hasta = new Date(base + 48*3600*1000).toISOString();

  const { data, error } = await sb.from('cobros').select('*')
    .eq('estado','pagado').gte('fecha', desde).lt('fecha', hasta);
  if(error){ log('cobros → '+error.message,'l-mal'); $('cont').innerHTML='<div class="vacio">Error leyendo cobros: '+error.message+'</div>'; return; }
  COBROS = (data||[]).filter(c => diaSantiago(c.fecha) === fecha);

  const { data:ci } = await sb.from('cierres_caja').select('*').eq('fecha', fecha);
  CIERRES = {}; (ci||[]).forEach(r => CIERRES[r.empresa_id] = r);

  render();
}

function cobrosDe(empId){ return COBROS.filter(c => c.empresa_id === empId); }
function sumBy(arr, f){ return arr.reduce((s,x)=>s+(f(x)||0),0); }

function render(){
  const cont = $('cont'); cont.innerHTML='';
  EMPRESAS.forEach(emp => {
    cont.insertAdjacentHTML('beforeend', MODO==='clarita' ? cardClarita(emp) : cardAndrea(emp));
  });
}

// ───────── MODO CLARITA: totales + registro de efectivo ─────────
function cardClarita(emp){
  const cobros = cobrosDe(emp.id);
  const bruto = sumBy(cobros, c=>c.monto);
  let filas = '';
  MEDIOS.forEach(m => {
    const subset = cobros.filter(c => normMedio(c.medio_pago)===m.key);
    if(!subset.length) return;
    const v = sumBy(subset, c=>c.monto);
    filas += '<div class="mrow"><span class="ml"><span class="mdot" style="background:'+m.color+'"></span>'
      + '<span class="mn">'+m.label+'</span><span class="mc">· '+subset.length+'</span></span>'
      + '<span class="mv">'+clp(v)+'</span></div>';
  });
  if(!filas) filas = '<div class="mrow"><span class="mc">Sin cobros este día</span><span></span></div>';

  const efSistema = sumBy(cobros.filter(c=>normMedio(c.medio_pago)==='efectivo'), c=>c.monto);
  const ci = CIERRES[emp.id] || {};
  const reg = (ci.efectivo_registrado!=null) ? ci.efectivo_registrado : efSistema;
  const ent = ci.efectivo_entregado || 0;

  return '<div class="emp-card"><div class="emp-h"><span class="emp-n">'+emp.corto+'</span>'
    + '<span class="emp-t">'+emp.nombre+'</span><span class="emp-bruto">'+clp(bruto)+'</span></div>'
    + '<div class="medios">'+filas
    + '<div class="mrow tot"><span class="ml"><span class="mn">Total bruto</span></span><span class="mv">'+clp(bruto)+'</span></div></div>'
    + '<div class="bloque-t">Efectivo</div>'
    + '<div class="ef">'
    +   '<div class="campo"><label>Según sistema</label><input class="ro" value="'+clp(efSistema)+'" readonly></div>'
    +   '<div class="campo"><label>Que entró (contado)</label><input id="ef-reg-'+emp.id+'" inputmode="numeric" value="'+reg+'"></div>'
    +   '<div class="campo"><label>Entregado al Dr.</label><input id="ef-ent-'+emp.id+'" inputmode="numeric" value="'+ent+'"></div>'
    +   '<button class="save" onclick="guardarEfectivo('+emp.id+')">Guardar</button>'
    + '</div>'
    + (ci.cuadrado ? '<div class="cerrado">Caja cerrada por Andrea</div>' : '')
    + '</div>';
}

async function guardarEfectivo(empId){
  const fecha = $('fecha').value;
  const reg = parseInt($('ef-reg-'+empId).value,10) || 0;
  const ent = parseInt($('ef-ent-'+empId).value,10) || 0;
  const { error } = await sb.from('cierres_caja').upsert({
    fecha: fecha, empresa_id: empId,
    efectivo_registrado: reg, efectivo_entregado: ent, registrado_por: 'Clarita'
  }, { onConflict: 'fecha,empresa_id' });
  if(error){ log('efectivo → '+error.message,'l-mal'); alert('Error: '+error.message); return; }
  log('Efectivo guardado · '+EMPRESAS.find(e=>e.id===empId).corto,'l-ok');
  cargar();
}

// ───────── MODO ANDREA: conciliación + cuadre + cierre ─────────
function cardAndrea(emp){
  const cobros = cobrosDe(emp.id);
  const bruto = sumBy(cobros, c=>c.monto);
  const comision = sumBy(cobros, c=>c.comision_real);
  const neto = bruto - comision;
  const conc = cobros.filter(c=>c.conciliado).length;
  const pctConc = cobros.length ? Math.round(conc/cobros.length*100) : 0;

  // cuadre efectivo
  const efSistema = sumBy(cobros.filter(c=>normMedio(c.medio_pago)==='efectivo'), c=>c.monto);
  const ci = CIERRES[emp.id];
  let alerta = '';
  if(!ci){
    alerta = '<div class="alerta warn">Clarita aún no registró el efectivo de este día.</div>';
  } else {
    const reg = ci.efectivo_registrado||0, ent = ci.efectivo_entregado||0;
    const dSist = reg - efSistema, dEnt = reg - ent;
    if(dSist===0 && dEnt===0){
      alerta = '<div class="alerta ok">Efectivo cuadrado: entró '+clp(reg)+', entregado '+clp(ent)+'.</div>';
    } else {
      let msg = 'Efectivo: sistema '+clp(efSistema)+' · contado '+clp(reg)+' · entregado '+clp(ent)+'.';
      if(dSist!==0) msg += ' Diferencia con sistema: '+clp(dSist)+'.';
      if(dEnt!==0) msg += ' Sin entregar al Dr.: '+clp(dEnt)+'.';
      alerta = '<div class="alerta bad">'+msg+'</div>';
    }
  }

  let lista = '';
  if(!cobros.length){ lista = '<div class="vacio">Sin cobros este día</div>'; }
  else cobros.forEach(c => {
    const mi = medioInfo(normMedio(c.medio_pago));
    const done = !!c.conciliado;
    const comInput = mi.tarjeta
      ? '<input id="com-'+c.id+'" inputmode="numeric" placeholder="comisión" value="'+(c.comision_real!=null?c.comision_real:'')+'">'
      : '';
    lista += '<div class="cobro'+(done?' done':'')+'">'
      + '<div class="cp"><span class="tagm" style="color:'+mi.color+'">'+mi.label+'</span> '
      +   '<span class="cr">'+(c.paciente_rut||'')+'</span></div>'
      + '<span class="cmonto">'+clp(c.monto)+'</span>'
      + comInput
      + '<button onclick="conciliar('+c.id+','+(mi.tarjeta?1:0)+')">'+(done?'✓':'Conciliar')+'</button>'
      + '</div>';
  });

  const cerrarBtn = ci && ci.cuadrado
    ? '<div class="cerrado">Caja cerrada · '+(ci.cerrado_por||'Andrea')+'</div>'
    : '<button class="cerrar" onclick="cerrarCaja('+emp.id+')">Cerrar caja del día</button>';

  return '<div class="emp-card"><div class="emp-h"><span class="emp-n">'+emp.corto+'</span>'
    + '<span class="emp-t">'+emp.nombre+'</span></div>'
    + '<div class="resumen">'
    +   '<div class="kpi"><div class="kl">Bruto</div><div class="kv">'+clp(bruto)+'</div></div>'
    +   '<div class="kpi"><div class="kl">Comisión</div><div class="kv">'+clp(comision)+'</div></div>'
    +   '<div class="kpi"><div class="kl">Neto</div><div class="kv">'+clp(neto)+'</div></div>'
    +   '<div class="kpi"><div class="kl">Conciliado</div><div class="kv">'+pctConc+'%</div></div>'
    + '</div>'
    + alerta
    + '<div class="bloque-t">Cobros del día</div>'
    + lista
    + cerrarBtn
    + '</div>';
}

async function conciliar(cobroId, esTarjeta){
  const upd = { conciliado:true, conciliado_en:new Date().toISOString() };
  if(esTarjeta){ const el=$('com-'+cobroId); upd.comision_real = el ? (parseInt(el.value,10)||0) : 0; }
  const { error } = await sb.from('cobros').update(upd).eq('id', cobroId);
  if(error){ log('conciliar → '+error.message,'l-mal'); alert('Error: '+error.message); return; }
  log('Cobro '+cobroId+' conciliado','l-ok');
  cargar();
}

async function cerrarCaja(empId){
  const fecha = $('fecha').value;
  if(!confirm('¿Cerrar la caja de '+EMPRESAS.find(e=>e.id===empId).corto+' para el '+fecha+'?')) return;
  const { error } = await sb.from('cierres_caja').upsert({
    fecha: fecha, empresa_id: empId, cuadrado:true, cerrado_por:'Andrea', cerrado_en:new Date().toISOString()
  }, { onConflict: 'fecha,empresa_id' });
  if(error){ log('cerrar → '+error.message,'l-mal'); alert('Error: '+error.message); return; }
  log('Caja cerrada · '+EMPRESAS.find(e=>e.id===empId).corto,'l-ok');
  cargar();
}

// ───────── pruebas ─────────
async function pruebaCobros(){
  const ahora = new Date().toISOString();
  const rows = [
    { paciente_rut:'0-0', empresa_id:1, monto:95000,  medio_pago:'WebPay',        estado:'pagado', fecha:ahora },
    { paciente_rut:'0-0', empresa_id:2, monto:45000,  medio_pago:'WebPay',        estado:'pagado', fecha:ahora },
    { paciente_rut:'0-0', empresa_id:1, monto:120000, medio_pago:'POS',           estado:'pagado', fecha:ahora },
    { paciente_rut:'0-0', empresa_id:1, monto:80000,  medio_pago:'Transferencia', estado:'pagado', fecha:ahora },
    { paciente_rut:'0-0', empresa_id:1, monto:30000,  medio_pago:'Efectivo',      estado:'pagado', fecha:ahora }
  ];
  const { error } = await sb.from('cobros').insert(rows);
  log(error?('prueba → '+error.message):'Cobros de ejemplo insertados (hoy).', error?'l-mal':'l-ok');
  cargar();
}
async function limpiarPrueba(){
  // Solo borra los cobros de prueba (RUT 0-0). No toca cierres_caja para no
  // eliminar un cierre real del día.
  const e1 = (await sb.from('cobros').delete().eq('paciente_rut','0-0')).error;
  log(e1?('limpiar cobros → '+e1.message):'Cobros de prueba eliminados.', e1?'l-mal':'l-ok');
  cargar();
}

// ───────── arranque ─────────
$('fecha').value = hoySantiago();
cargar();
</script>
</body>
</html>
