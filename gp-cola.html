<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cola en vivo · GP Dermatología</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --crema:#f4efe7; --crema2:#fbf8f2; --verde:#1f3d34; --verde2:#2c5446;
    --tinta:#26201a; --suave:#8a8076; --linea:#e3dccf;
    --ok:#2f7d5b; --mal:#b23b3b; --esp:#b8860b; --azul:#2c5446;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--crema);color:var(--tinta);
    font-family:'Inter',system-ui,sans-serif;line-height:1.5;padding:20px}
  .wrap{max-width:780px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px}
  h1{font-family:'Playfair Display',serif;font-weight:600;color:var(--verde);font-size:26px;margin:0}
  .sub{color:var(--suave);font-size:14px;margin:0 0 18px}
  .estado{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--suave);
    font-family:ui-monospace,monospace}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--suave)}
  .dot.ok{background:var(--ok)} .dot.mal{background:var(--mal)} .dot.esp{background:var(--esp)}
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .bar .sp{flex:1}
  button{font-family:inherit;font-size:14px;font-weight:600;border-radius:10px;
    padding:9px 15px;border:1px solid var(--verde);background:var(--verde);color:#fff;cursor:pointer;transition:.15s}
  button:hover{background:var(--verde2)}
  button.ghost{background:transparent;color:var(--verde)}
  button.ghost:hover{background:rgba(31,61,52,.06)}
  button.mini{font-size:12.5px;padding:7px 11px;border-radius:9px}
  button.danger{border-color:var(--mal);color:var(--mal);background:transparent}
  button.danger:hover{background:rgba(178,59,59,.07)}
  button:disabled{opacity:.5;cursor:default}

  .card{background:var(--crema2);border:1px solid var(--linea);border-radius:16px;
    padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 0 rgba(0,0,0,.02)}
  .chead{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    padding:3px 9px;border-radius:999px}
  .tag.apo{background:#eaf1ec;color:var(--verde)}
  .tag.pago{background:#f3ecdd;color:#7a5a13}
  .tag.otro{background:#eee;color:#555}
  .tag.res{background:#f0e2da;color:#8a4b2f;border:.5px solid #e3cdbf}
  .cname{font-family:'Playfair Display',serif;font-size:19px;color:var(--tinta);font-weight:600}
  .crut{font-family:ui-monospace,monospace;font-size:12.5px;color:var(--suave);margin-left:auto}
  .cmeta{font-size:13.5px;color:var(--suave);margin:2px 0 14px}

  .campos{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
  .campo{flex:1;min-width:140px;display:flex;flex-direction:column;gap:4px}
  .campo label{font-size:12px;color:var(--suave);font-weight:500}
  .campo input,.campo select{font-family:inherit;font-size:14px;padding:9px 11px;
    border:1px solid var(--linea);border-radius:9px;background:#fff;color:var(--tinta)}
  .campo input:focus,.campo select:focus{outline:none;border-color:var(--verde2)}

  .desglose{border:1px solid var(--linea);border-radius:11px;overflow:hidden;margin-bottom:14px}
  .drow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-size:14px;
    border-bottom:1px solid var(--linea)}
  .drow:last-child{border-bottom:none}
  .drow .soc{font-weight:600}
  .drow .det{color:var(--suave);font-size:12px;margin-left:6px;font-weight:400}
  .drow .monto{font-family:ui-monospace,monospace}
  .drow.lock .soc::after{content:" · fijo";color:var(--suave);font-weight:400;font-size:11px}
  .drow.total{background:#f6f1e8;font-weight:600}

  .medio{display:flex;gap:8px;margin-bottom:14px}
  .medio button{flex:1;background:#fff;color:var(--verde);border:1px solid var(--linea);font-weight:500}
  .medio button.active{background:var(--verde);color:#fff;border-color:var(--verde)}

  .acc{display:flex;gap:10px;flex-wrap:wrap}
  .acc button{flex:1;min-width:130px}

  .vacio{text-align:center;color:var(--suave);padding:48px 20px;
    font-family:'Playfair Display',serif;font-size:19px}
  .vacio small{display:block;font-family:'Inter';font-size:13px;margin-top:6px}

  details.debug{margin-top:24px;border-top:1px solid var(--linea);padding-top:14px}
  details.debug summary{cursor:pointer;color:var(--suave);font-size:13px}
  .dbtns{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
  #log{font-family:ui-monospace,monospace;font-size:12px;background:#fffdf9;
    border:1px solid var(--linea);border-radius:10px;padding:11px;max-height:200px;overflow:auto;white-space:pre-wrap}
  .l-ok{color:var(--ok)} .l-mal{color:var(--mal)} .l-rt{color:var(--verde2);font-weight:600} .l-dim{color:var(--suave)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Cola en vivo</h1>
    <div class="estado"><span class="dot" id="rtDot"></span><span id="rtTxt">conectando…</span></div>
  </div>
  <p class="sub">Recepción · Clarita</p>

  <div class="bar">
    <button class="ghost mini" onclick="cargarCola()">Refrescar</button>
    <button class="mini" onclick="toggleManual()">+ Registrar pago</button>
    <span class="sp"></span>
    <span class="estado"><span id="contador">—</span></span>
  </div>

  <div id="manual" class="card" style="display:none">
    <div class="chead"><span class="tag pago">Pago manual</span>
      <span class="cname">Registrar cobro</span></div>
    <div class="cmeta">Para pagos en efectivo, POS o transferencia que no vienen del tótem.</div>
    <div class="campos">
      <div class="campo"><label>Nombre (opcional)</label><input id="man-nom" placeholder="Nombre y apellido"></div>
      <div class="campo" style="max-width:190px"><label>RUT (opcional)</label><input id="man-rut" placeholder="12.345.678-9"></div>
    </div>
    <div class="campo" style="margin-bottom:10px">
      <label>Prestación</label>
      <select id="man-prestacion" onchange="onSeleccionarPrestacionManual()">
        <option value="">Elegir del catálogo…</option>
      </select>
    </div>
    <div class="campos">
      <div class="campo"><label>SkinTouch · honorario</label><input id="man-hon" inputmode="numeric" placeholder="0"></div>
      <div class="campo"><label>LaserTouch · insumo</label><input id="man-ins" inputmode="numeric" placeholder="0"></div>
    </div>
    <div class="medio">
      <button id="mm-ef" class="active" onclick="setMedioManual('Efectivo')">Efectivo</button>
      <button id="mm-po" onclick="setMedioManual('POS')">POS</button>
      <button id="mm-tr" onclick="setMedioManual('Transferencia')">Transferencia</button>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--suave);margin-bottom:14px">
      <input type="checkbox" id="man-reemb"> Honorario reembolsable (para certificado)
    </label>
    <div class="acc">
      <button onclick="registrarManual()">Registrar pago</button>
      <button class="ghost" onclick="toggleManual()">Cancelar</button>
    </div>
  </div>

  <div id="cola"></div>

  <div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://nirxkzkfcctdigvuapuc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pcnhremtmY2N0ZGlndnVhcHVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDY5MTUsImV4cCI6MjA5NTEyMjkxNX0.iGTkHTRgdsEDoUsvS9ApQtSRAJV52z-_IASlFBmPqDM';

const OPERADOR = 'Clarita';
const RUT_PRUEBA = '0-0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = id => document.getElementById(id);
const fmt = n => '$' + (n||0).toLocaleString('es-CL');
function log(m, c){ const d=$('log'); const t=new Date().toLocaleTimeString('es-CL');
  const s=document.createElement('div'); if(c)s.className=c; s.textContent=`[${t}] ${m}`;
  d.appendChild(s); d.scrollTop=d.scrollHeight; }

let EMP = { skin:null, laser:null };       // ids de empresas
let COLA = [];                              // filas de v_clarita_pendientes
const medioSel = {};                        // medio elegido por tarjeta de pago

// Marca discreta cuando el tótem trae el flag requiere_reserva en el detalle
function tagReserva(r){
  return (r && r.detalle && r.detalle.requiere_reserva)
    ? '<span class="tag res">Requiere reserva</span>' : '';
}

// ---- carga de empresas (ids SkinTouch / LaserTouch) ----
async function cargarEmpresas(){
  const { data, error } = await sb.from('empresas').select('id,nombre,tipo');
  if(error){ log('empresas → '+error.message,'l-mal'); return; }
  (data||[]).forEach(e=>{ if(e.tipo==='honorarios')EMP.skin=e.id; if(e.tipo==='insumos')EMP.laser=e.id; });
  log(`Empresas: SkinTouch #${EMP.skin}, LaserTouch #${EMP.laser}`,'l-dim');
}

// ---- carga de la cola ----
async function cargarCola(){
  const { data, error } = await sb.from('v_clarita_pendientes').select('*');
  if(error){ log('cola → '+error.message,'l-mal'); return; }
  COLA = data || [];
  $('contador').textContent = COLA.length + (COLA.length===1?' pendiente':' pendientes');
  render();
}

function nombrePac(r){
  const n = [r.nombre, r.apellido].filter(Boolean).join(' ').trim();
  return n || (r.detalle && r.detalle.nombre) || r.paciente_rut || 'Paciente';
}

function render(){
  const cont = $('cola'); cont.innerHTML='';
  if(!COLA.length){
    cont.innerHTML = '<div class="vacio">Sin pendientes<small>Todo en orden</small></div>';
    return;
  }
  COLA.forEach(r=>{
    if(r.tipo==='apoderado') cont.insertAdjacentHTML('beforeend', cardApoderado(r));
    else if(r.tipo==='pago') cont.insertAdjacentHTML('beforeend', cardPago(r));
    else cont.insertAdjacentHTML('beforeend', cardOtro(r));
  });
}

// ---- tarjeta: apoderado ----
function cardApoderado(r){
  const d = r.detalle||{};
  return `<div class="card">
    <div class="chead"><span class="tag apo">Apoderado</span>${tagReserva(r)}
      <span class="cname">${nombrePac(r)}</span>
      <span class="crut">${r.paciente_rut||''}</span></div>
    <div class="cmeta">${d.motivo || 'Menor de edad · requiere aprobación de apoderado presente'}</div>
    <div class="campos">
      <div class="campo"><label>Nombre del apoderado</label><input id="apo-n-${r.id}" placeholder="Nombre y apellido"></div>
      <div class="campo"><label>RUT</label><input id="apo-r-${r.id}" placeholder="12.345.678-9"></div>
      <div class="campo" style="max-width:160px"><label>Relación</label>
        <select id="apo-rel-${r.id}"><option>Madre</option><option>Padre</option><option>Tutor legal</option><option>Otro</option></select></div>
    </div>
    <div class="acc">
      <button onclick="aprobarApoderado(${r.id},'${r.sesion_id||''}')">Aprobar y continuar</button>
      <button class="danger" onclick="rechazar(${r.id})">Rechazar</button>
    </div>
  </div>`;
}

// ---- tarjeta: pago ----
function cardPago(r){
  const d = r.detalle||{};
  const hon = d.honorario||0, ins = d.insumo||0, tot = hon+ins;
  const neto = Math.round(ins/1.19), iva = ins-neto;
  if(!medioSel[r.id]) medioSel[r.id]='Transferencia';
  const reemb = d.reembolsable ? ' · reembolsable' : '';
  return `<div class="card">
    <div class="chead"><span class="tag pago">Pago</span>${tagReserva(r)}
      <span class="cname">${nombrePac(r)}</span>
      <span class="crut">${r.paciente_rut||''}</span></div>
    <div class="cmeta">${d.descripcion||'Confirmación de pago'}</div>
    <div class="desglose">
      <div class="drow"><span><span class="soc">SkinTouch</span><span class="det">honorarios · exento${reemb}</span></span><span class="monto">${fmt(hon)}</span></div>
      <div class="drow lock"><span><span class="soc">LaserTouch</span><span class="det">insumos · IVA ${fmt(iva)}</span></span><span class="monto">${fmt(ins)}</span></div>
      <div class="drow total"><span>Total</span><span class="monto">${fmt(tot)}</span></div>
    </div>
    <div class="medio">
      <button id="m-tr-${r.id}" class="active" onclick="setMedio(${r.id},'Transferencia')">Transferencia</button>
      <button id="m-po-${r.id}" onclick="setMedio(${r.id},'POS')">POS</button>
      <button id="m-ef-${r.id}" onclick="setMedio(${r.id},'Efectivo')">Efectivo</button>
    </div>
    <div class="acc">
      <button onclick="confirmarPago(${r.id},'${r.sesion_id||''}')">Confirmar y emitir boletas</button>
      <button class="danger" onclick="rechazar(${r.id})">Anular</button>
    </div>
  </div>`;
}

function cardOtro(r){
  return `<div class="card"><div class="chead"><span class="tag otro">${r.tipo}</span>${tagReserva(r)}
    <span class="cname">${nombrePac(r)}</span><span class="crut">${r.paciente_rut||''}</span></div>
    <div class="cmeta">Pendiente sin vista específica todavía.</div>
    <div class="acc"><button class="danger" onclick="rechazar(${r.id})">Descartar</button></div></div>`;
}

function setMedio(id, m){
  medioSel[id]=m;
  $('m-tr-'+id).classList.toggle('active', m==='Transferencia');
  $('m-po-'+id).classList.toggle('active', m==='POS');
  $('m-ef-'+id).classList.toggle('active', m==='Efectivo');
}

// ---- registro manual de pago (efectivo / POS / transferencia, sin tótem) ----
let medioManual = 'Efectivo';
let CATALOGO_MANUAL = [];
let prestacionManualSeleccionada = null;

async function cargarCatalogoManual(){
  const { data, error } = await sb.from('prestaciones')
    .select('id,codigo,nombre,honorario_monto,insumo_monto,reembolsable,glosa_fonasa,glosa_boleta')
    .eq('activo', true).order('categoria').order('nombre');
  if(error){ log('catálogo manual → '+error.message,'l-mal'); return; }
  CATALOGO_MANUAL = data||[];
  const sel = $('man-prestacion');
  sel.innerHTML = '<option value="">Elegir del catálogo…</option>' + CATALOGO_MANUAL.map(p=>
    '<option value="'+p.id+'">'+p.nombre+(p.codigo==='GEN-01'?' (cobro inusual)':'')+'</option>'
  ).join('');
}

function onSeleccionarPrestacionManual(){
  const id = parseInt($('man-prestacion').value,10);
  prestacionManualSeleccionada = CATALOGO_MANUAL.find(p=>p.id===id) || null;
  if(!prestacionManualSeleccionada) return;
  const p = prestacionManualSeleccionada;
  $('man-hon').value = p.honorario_monto || '';
  $('man-ins').value = p.insumo_monto || '';
  $('man-reemb').checked = !!p.reembolsable;
}

function toggleManual(){
  const m=$('manual'); const abrir = m.style.display==='none';
  m.style.display = abrir ? 'block' : 'none';
  if(abrir && !CATALOGO_MANUAL.length) cargarCatalogoManual();
}
function setMedioManual(x){
  medioManual=x;
  $('mm-ef').classList.toggle('active', x==='Efectivo');
  $('mm-po').classList.toggle('active', x==='POS');
  $('mm-tr').classList.toggle('active', x==='Transferencia');
}

// Crea el cobro (lo que necesita la caja). La boleta local es complementaria:
// si falla por permisos, el cobro igual queda registrado.
async function insertarCobro(empId, monto, medio, rut, opts){
  opts = opts || {};
  const { data:c, error:e } = await sb.from('cobros').insert({
    paciente_rut: rut || null, empresa_id: empId, monto: monto,
    medio_pago: medio, estado: 'pagado', proveedor_ref: 'manual'
  }).select().single();
  if(e) throw e;
  let neto = monto, iva = 0;
  if(opts.esInsumo){ neto = Math.round(monto/1.19); iva = monto - neto; }
  const { error:b } = await sb.from('boletas').insert({
    cobro_id: c.id, empresa_id: empId, paciente_rut: rut || null,
    neto: neto, iva: iva, total: monto, reembolsable: !!opts.reembolsable
  });
  if(b) log('boleta → '+b.message+' (el cobro sí quedó registrado)','l-dim');
  return c.id;
}

// Emite la boleta REAL en Bsale para un pago manual. No bloquea el registro
// del cobro si Bsale falla — queda 'pendiente'/'error' en boletas para revisar.
async function emitirBoletaManual(empresa, monto, cobroId, rut, opts){
  opts = opts || {};
  const p = prestacionManualSeleccionada;
  const comment = opts.reembolsable
    ? (p && p.glosa_fonasa) || 'Atención médica'
    : (p && p.glosa_boleta) || (p && p.nombre) || 'Atención médica';
  try{
    const r = await fetch('/api/bsale-emitir', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        empresa, cobro_id: cobroId, paciente_rut: rut || null,
        items: [{ monto, comment, reembolsable: !!opts.reembolsable, prestacion_id: p ? p.id : null }]
      })
    });
    const data = await r.json();
    if(!data.ok) log('Bsale ('+empresa+') → '+(data.error||'no se pudo emitir')+' — el cobro sí quedó registrado','l-mal');
    else log('Boleta Bsale emitida · '+empresa,'l-ok');
  }catch(e){ log('Bsale ('+empresa+') → '+(e.message||e)+' — el cobro sí quedó registrado','l-mal'); }
}

async function registrarManual(){
  const rut = $('man-rut').value.trim() || null;
  const hon = parseInt($('man-hon').value,10) || 0;
  const ins = parseInt($('man-ins').value,10) || 0;
  const reemb = $('man-reemb').checked;
  if(hon<=0 && ins<=0){ alert('Ingresa al menos un monto (SkinTouch o LaserTouch).'); return; }
  try{
    if(hon>0){
      const cobroId = await insertarCobro(EMP.skin, hon, medioManual, rut, { reembolsable:reemb, esInsumo:false });
      await emitirBoletaManual('skintouch', hon, cobroId, rut, { reembolsable:reemb });
    }
    if(ins>0){
      const cobroId = await insertarCobro(EMP.laser, ins, medioManual, rut, { reembolsable:false, esInsumo:true });
      await emitirBoletaManual('lasertouch', ins, cobroId, rut, { reembolsable:false });
    }
    log(`Pago manual registrado · ${fmt(hon+ins)} · ${medioManual}`,'l-ok');
    $('man-nom').value=''; $('man-rut').value=''; $('man-hon').value=''; $('man-ins').value=''; $('man-reemb').checked=false;
    $('man-prestacion').value=''; prestacionManualSeleccionada=null;
    toggleManual();
  }catch(err){ log('manual → '+(err.message||err),'l-mal'); alert('Error al registrar: '+(err.message||err)); }
}

// ---- resolver: aprobar apoderado ----
async function aprobarApoderado(id, sesion){
  const nombre = $('apo-n-'+id).value.trim();
  const rut = $('apo-r-'+id).value.trim();
  const relacion = $('apo-rel-'+id).value;
  if(!nombre || !rut){ alert('Falta nombre y RUT del apoderado.'); return; }
  const row = COLA.find(x=>x.id===id) || {};
  const detalle = Object.assign({}, row.detalle||{}, { apoderado:{ nombre, rut, relacion } });
  const { error } = await sb.from('clarita_acciones').update({
    estado:'aprobado', resuelto_por:OPERADOR, resuelto_en:new Date().toISOString(), detalle
  }).eq('id', id);
  if(error){ log('aprobar → '+error.message,'l-mal'); alert('Error: '+error.message); return; }
  if(sesion){ await sb.from('totem_sesiones').update({
      estado:'apoderado_ok', updated_at:new Date().toISOString() }).eq('id', sesion); }
  log(`Apoderado aprobado · acción ${id} · ${nombre}`,'l-ok');
  cargarCola();
}

// ---- resolver: confirmar pago ----
// Emite la boleta REAL en Bsale para un pago confirmado desde la cola.
// Si hay presupuesto_id, usa el modo automático (glosa exacta del catálogo,
// vía presupuesto_items) — mismo mecanismo que el pago por WebPay.
// Si no lo hay (entradas antiguas o de demo), usa la descripción libre.
async function emitirBoletaCola(empresa, monto, cobroId, rut, d){
  const body = { empresa, cobro_id: cobroId, paciente_rut: rut || null };
  if (d.presupuesto_id) {
    body.presupuesto_id = d.presupuesto_id;
  } else {
    body.items = [{ monto, comment: d.descripcion || 'Atención médica', reembolsable: !!d.reembolsable }];
  }
  try{
    const r = await fetch('/api/bsale-emitir', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await r.json();
    if(!data.ok) log('Bsale ('+empresa+') → '+(data.error||'no se pudo emitir')+' — el cobro sí quedó registrado','l-mal');
    else log('Boleta Bsale emitida · '+empresa,'l-ok');
  }catch(e){ log('Bsale ('+empresa+') → '+(e.message||e)+' — el cobro sí quedó registrado','l-mal'); }
}

async function confirmarPago(id, sesion){
  const row = COLA.find(x=>x.id===id); if(!row){ return; }
  const d = row.detalle||{}; const hon=d.honorario||0, ins=d.insumo||0;
  const medio = medioSel[id]||'Transferencia';
  const rut = row.paciente_rut;
  try{
    if(hon>0){
      const { data:c1, error:e1 } = await sb.from('cobros').insert({
        paciente_rut:rut, empresa_id:EMP.skin, monto:hon, medio_pago:medio, estado:'pagado' }).select().single();
      if(e1) throw e1;
      const { error:b1 } = await sb.from('boletas').insert({
        cobro_id:c1.id, empresa_id:EMP.skin, paciente_rut:rut, neto:hon, iva:0, total:hon, reembolsable:!!d.reembolsable });
      if(b1) throw b1;
      await emitirBoletaCola('skintouch', hon, c1.id, rut, d);
    }
    if(ins>0){
      const neto=Math.round(ins/1.19), iva=ins-neto;
      const { data:c2, error:e2 } = await sb.from('cobros').insert({
        paciente_rut:rut, empresa_id:EMP.laser, monto:ins, medio_pago:medio, estado:'pagado' }).select().single();
      if(e2) throw e2;
      const { error:b2 } = await sb.from('boletas').insert({
        cobro_id:c2.id, empresa_id:EMP.laser, paciente_rut:rut, neto, iva, total:ins, reembolsable:false });
      if(b2) throw b2;
      await emitirBoletaCola('lasertouch', ins, c2.id, rut, Object.assign({}, d, { reembolsable:false }));
    }
    const detalle = Object.assign({}, d, { medio, cobrado:hon+ins });
    const { error:eu } = await sb.from('clarita_acciones').update({
      estado:'aprobado', resuelto_por:OPERADOR, resuelto_en:new Date().toISOString(), detalle }).eq('id', id);
    if(eu) throw eu;
    if(sesion){ await sb.from('totem_sesiones').update({
        estado:'pagado', medio_pago:medio, updated_at:new Date().toISOString() }).eq('id', sesion); }
    log(`Pago confirmado · acción ${id} · ${fmt(hon+ins)} · ${medio}`,'l-ok');
    cargarCola();
  }catch(err){ log('pago → '+(err.message||err),'l-mal'); alert('Error al confirmar: '+(err.message||err)); }
}

// ---- rechazar / anular ----
async function rechazar(id){
  if(!confirm('¿Rechazar este pendiente?')) return;
  const { error } = await sb.from('clarita_acciones').update({
    estado:'rechazado', resuelto_por:OPERADOR, resuelto_en:new Date().toISOString() }).eq('id', id);
  if(error){ log('rechazar → '+error.message,'l-mal'); return; }
  log(`Rechazado · acción ${id}`,'l-dim'); cargarCola();
}

// ---- Realtime ----
function suscribir(){
  $('rtDot').className='dot esp'; $('rtTxt').textContent='suscribiendo…';
  sb.channel('cola-clarita')
    .on('postgres_changes', { event:'*', schema:'public', table:'clarita_acciones' },
      payload=>{ log('◆ Realtime '+payload.eventType,'l-rt'); cargarCola(); })
    .subscribe(st=>{
      if(st==='SUBSCRIBED'){ $('rtDot').className='dot ok'; $('rtTxt').textContent='en vivo'; }
      else if(st==='CHANNEL_ERROR'||st==='TIMED_OUT'){ $('rtDot').className='dot mal'; $('rtTxt').textContent=st; }
      else { $('rtTxt').textContent=st; }
    });
}

// ---- arranque ----
(async ()=>{ await cargarEmpresas(); await cargarCola(); suscribir(); })();
</script>
