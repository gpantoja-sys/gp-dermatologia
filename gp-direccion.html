<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Dirección · GP Dermatología</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --crema:#f4efe7; --crema2:#fbf8f2; --verde:#1f3d34; --verde2:#2c5446;
    --tinta:#26201a; --suave:#8a8076; --linea:#e3dccf;
    --reemb:#2f6d8a; --noreemb:#8a6d2f; --ok:#2f7d5b; --mal:#b23b3b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--crema);color:var(--tinta);font-family:'Inter',system-ui,sans-serif;
    line-height:1.5;padding:22px 16px 60px;display:flex;justify-content:center}
  .wrap{max-width:880px;width:100%}
  h1{font-family:'Playfair Display',serif;font-weight:600;color:var(--verde);font-size:26px;margin:0}
  .sub{color:var(--suave);font-size:13.5px;margin:0 0 20px}

  /* paciente */
  .pac{background:var(--crema2);border:1px solid var(--linea);border-radius:16px;padding:16px 18px;margin-bottom:18px}
  .pac .row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .campo{display:flex;flex-direction:column;gap:4px}
  .campo label{font-size:11.5px;color:var(--suave);font-weight:500}
  .campo input{font-family:ui-monospace,monospace;font-size:16px;padding:10px 12px;border:1px solid var(--linea);
    border-radius:10px;background:#fff;color:var(--tinta);width:200px}
  button.buscar{font-family:inherit;font-size:14px;font-weight:600;border-radius:10px;padding:11px 18px;
    border:1px solid var(--verde);background:var(--verde);color:#fff;cursor:pointer}
  .pac .ident{margin-top:12px;font-size:15px;display:none}
  .pac .ident.show{display:block}
  /* ── Qué pagó hoy ── */
  .hoy{margin-top:14px;padding-top:14px;border-top:1px solid var(--linea);display:none}
  .hoy.show{display:block}
  .hoy-tit{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
           color:#8a8076;margin:0 0 8px}
  .hoy-b{border-radius:12px;padding:10px 13px;margin-bottom:8px}
  .hoy-b.ok{background:#e8f0ec;border:1px solid #bcd4c7}
  .hoy-b.no{background:#fbf3d9;border:1px solid #d9c58a}
  .hoy-b.pe{background:#fdeceb;border:1px solid #e3b3ae}
  .hoy-et{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
  .hoy-b.ok .hoy-et{color:#1f3d34} .hoy-b.no .hoy-et{color:#8a6d1f} .hoy-b.pe .hoy-et{color:#9b2c2c}
  .hoy-l{display:flex;justify-content:space-between;gap:10px;font-size:14px;line-height:1.5;padding:2px 0}
  .hoy-l .m{font-variant-numeric:tabular-nums;white-space:nowrap}
  .hoy-b.no .hoy-l{text-decoration:line-through;opacity:.75}
  .hoy-vacio{font-size:13px;color:#8a8076;font-style:italic}
  .pac .ident .nom{font-weight:600;font-size:17px;color:var(--verde)}
  .pac .ident .det{font-size:12.5px;color:var(--suave)}
  .pac .ident.no{color:var(--mal)}

  /* columnas */
  .cols{display:flex;gap:16px;flex-wrap:wrap}
  .col{flex:1;min-width:300px;background:var(--crema2);border:1px solid var(--linea);border-radius:16px;padding:18px;display:flex;flex-direction:column}
  .col.reemb{border-top:3px solid var(--reemb)}
  .col.noreemb{border-top:3px solid var(--noreemb)}
  .col h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:2px}
  .col.reemb h2{color:var(--reemb)} .col.noreemb h2{color:var(--noreemb)}
  .col .ch{font-size:11.5px;color:var(--suave);margin-bottom:14px}
  .col select{width:100%;font-family:inherit;font-size:14px;padding:10px 11px;border:1px solid var(--linea);
    border-radius:10px;background:#fff;color:var(--tinta);margin-bottom:8px}
  .col .add{width:100%;font-family:inherit;font-size:13.5px;font-weight:600;border-radius:9px;padding:9px;
    border:1px dashed var(--suave);background:transparent;color:var(--verde);cursor:pointer;margin-bottom:12px}

  .items{flex:1;min-height:40px}
  .item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--linea);font-size:13.5px}
  .item:last-child{border-bottom:none}
  .item .nm{flex:1;min-width:0}
  .item .nm .c{font-size:11px;color:var(--suave);font-family:ui-monospace,monospace}
  .item .mo{font-family:ui-monospace,monospace;white-space:nowrap}
  .item .del{border:none;background:transparent;color:var(--mal);cursor:pointer;font-size:17px;line-height:1;padding:0 2px}
  .vacio{color:var(--suave);font-size:13px;text-align:center;padding:16px 0}

  .tot{border-top:1px solid var(--linea);margin-top:6px;padding-top:12px}
  .tot .l{display:flex;justify-content:space-between;font-size:12.5px;color:var(--suave);padding:2px 0}
  .tot .l.g{font-size:16px;font-weight:600;color:var(--tinta);margin-top:4px}
  .tot .l.g .v{font-family:ui-monospace,monospace}
  .cobrar{margin-top:14px;width:100%;font-family:inherit;font-size:15px;font-weight:600;border-radius:11px;
    padding:13px;border:none;color:#fff;cursor:pointer}
  .col.reemb .cobrar{background:var(--reemb)} .col.noreemb .cobrar{background:var(--noreemb)}
  .cobrar:disabled{opacity:.4;cursor:not-allowed}

  #log{font-family:ui-monospace,monospace;font-size:12px;background:#fffdf9;border:1px solid var(--linea);
    border-radius:10px;padding:11px;max-height:150px;overflow:auto;white-space:pre-wrap;margin-top:18px}
  .l-ok{color:var(--ok)} .l-mal{color:var(--mal)} .l-dim{color:var(--suave)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Panel Dirección</h1>
  <p class="sub">Venta del 2do piso · agrega la atención y la paciente paga en el tótem</p>

  <div class="pac">
    <div class="row">
      <div class="campo"><label>RUT de la paciente (desde Medilink)</label>
        <input id="rut" placeholder="14543741-5" autocomplete="off"></div>
      <button class="buscar" onclick="buscar()">Buscar</button>
    </div>
    <div id="ident" class="ident"></div>
    <div id="hoy" class="hoy"></div>
  </div>

  <div class="cols">
    <div class="col reemb">
      <h2>Reembolsable</h2>
      <div class="ch">Sale con boleta + certificado para la Isapre</div>
      <select id="sel-r"></select>
      <button class="add" onclick="agregar('r')">+ Agregar al reembolsable</button>
      <div class="items" id="items-r"><div class="vacio">Sin prestaciones</div></div>
      <div class="tot" id="tot-r"></div>
      <button class="cobrar" id="btn-r" onclick="enviar('r')" disabled>Enviar al tótem</button>
    </div>

    <div class="col noreemb">
      <h2>No reembolsable</h2>
      <div class="ch">Boleta simple, sin certificado</div>
      <select id="sel-n"></select>
      <button class="add" onclick="agregar('n')">+ Agregar al no reembolsable</button>
      <div class="items" id="items-n"><div class="vacio">Sin prestaciones</div></div>
      <div class="tot" id="tot-n"></div>
      <button class="cobrar" id="btn-n" onclick="enviar('n')" disabled>Enviar al tótem</button>
    </div>
  </div>

  <div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://nirxkzkfcctdigvuapuc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pcnhremtmY2N0ZGlndnVhcHVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDY5MTUsImV4cCI6MjA5NTEyMjkxNX0.iGTkHTRgdsEDoUsvS9ApQtSRAJV52z-_IASlFBmPqDM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = id => document.getElementById(id);
const clp = n => '$' + (n||0).toLocaleString('es-CL');
function log(m,c){ const d=$('log'); const t=new Date().toLocaleTimeString('es-CL');
  const s=document.createElement('div'); if(c)s.className=c; s.textContent='['+t+'] '+m; d.appendChild(s); d.scrollTop=d.scrollHeight; }

// normaliza RUT a canónico con guión sin puntos
function normRut(v){
  let s=(v||'').toString().trim().toUpperCase().replace(/\./g,'').replace(/\s/g,'');
  if(s.indexOf('-')<0 && s.length>1) s = s.slice(0,-1)+'-'+s.slice(-1);
  return s;
}

let CATALOGO = [];          // prestaciones activas
let PAC = null;             // paciente identificado
const cesta = { r: [], n: [] };   // prestaciones agregadas por columna

async function init(){
  const { data, error } = await sb.from('prestaciones')
    .select('id,codigo,categoria,nombre,indicacion,honorario_monto,insumo_monto,reembolsable,activo')
    .eq('activo', true).order('categoria').order('nombre');
  if(error){ log('catálogo → '+error.message,'l-mal'); return; }
  CATALOGO = data||[];
  llenarSelect('r', true);
  llenarSelect('n', false);
  log('Catálogo cargado · '+CATALOGO.length+' prestaciones activas','l-dim');
}

function llenarSelect(col, reembFlag){
  const sel = $(col==='r'?'sel-r':'sel-n');
  const lista = CATALOGO.filter(p => !!p.reembolsable === reembFlag);

  // Agrupar por categoría; dentro de cada grupo, ordenar por CÓDIGO.
  // El código va primero en el texto: así, al escribir "CRIO" o "EXTIR"
  // con el desplegable abierto, salta directo a esa prestación.
  var grupos = {};
  lista.forEach(function(p){
    var cat = p.categoria || 'Otros';
    if(!grupos[cat]) grupos[cat] = [];
    grupos[cat].push(p);
  });
  var cats = Object.keys(grupos).sort(function(a,b){ return a.localeCompare(b,'es'); });

  var html = '<option value="">Elegir prestación…</option>';
  cats.forEach(function(cat){
    var items = grupos[cat].slice().sort(function(a,b){
      return (a.codigo||'').localeCompare(b.codigo||'','es');
    });
    html += '<optgroup label="'+String(cat).replace(/"/g,'&quot;')+'">';
    html += items.map(function(p){
      return '<option value="'+p.id+'">'+(p.codigo||'')+' · '+p.nombre
           + ' · '+clp((p.honorario_monto||0)+(p.insumo_monto||0))+'</option>';
    }).join('');
    html += '</optgroup>';
  });
  sel.innerHTML = html;
}

async function buscar(){
  const rut = normRut($('rut').value);
  $('rut').value = rut;
  const id = $('ident'); id.className='ident show';
  if(!rut || rut.length<3){ id.classList.add('no'); id.innerHTML='Ingresa un RUT válido.'; PAC=null; refrescarBotones(); return; }
  id.innerHTML='Buscando…';
  const { data, error } = await sb.from('pacientes')
    .select('rut,nombre,apellido,apellido2,tel,email,requiere_reserva').eq('rut', rut).maybeSingle();
  if(error){ id.className='ident show no'; id.innerHTML='Error: '+error.message; PAC=null; refrescarBotones(); return; }
  if(!data){ id.className='ident show no'; id.innerHTML='No se encontró ese RUT en la base. Verifica el formato (14543741-5).'; PAC=null; refrescarBotones(); return; }
  PAC = data;
  const nom = [data.nombre,data.apellido,data.apellido2].filter(Boolean).join(' ');
  id.className='ident show';
  id.innerHTML = '<div class="nom">'+nom+'</div><div class="det">'+data.rut+(data.tel?(' · '+data.tel):'')+'</div>';
  refrescarBotones();
  cargarHoy(rut);
}

// ══════════════════════════════════════════════════════════════════════════
//  QUÉ PAGÓ HOY  ·  antes de atender, confirma qué quedó pagado y qué no.
//  Lo que la paciente quita en el tótem aparece acá como NO REALIZA HOY.
// ══════════════════════════════════════════════════════════════════════════
async function cargarHoy(rut){
  const box = $('hoy');
  box.className = 'hoy'; box.innerHTML = '';
  try{
    const desde = new Date(); desde.setHours(0,0,0,0);
    const { data: pres } = await sb.from('presupuestos')
      .select('id,estado,fecha').eq('paciente_rut', rut)
      .gte('fecha', desde.toISOString()).order('fecha',{ascending:false});
    if(!pres || !pres.length){
      box.className = 'hoy show';
      box.innerHTML = '<div class="hoy-tit">Atención de hoy</div>'
                    + '<div class="hoy-vacio">No hay atenciones registradas hoy para este RUT.</div>';
      return;
    }
    const ids = pres.map(function(p){ return p.id; });
    const { data: its } = await sb.from('presupuesto_items')
      .select('presupuesto_id,honorario_monto,insumo_monto,excluido,prestaciones(nombre)')
      .in('presupuesto_id', ids);
    const estadoDe = {}; pres.forEach(function(p){ estadoDe[p.id] = p.estado; });

    const pagado = [], pendiente = [], fuera = [];
    (its||[]).forEach(function(i){
      const fila = { nombre: ((i.prestaciones||{}).nombre)||'Prestación',
                     monto: (i.honorario_monto||0)+(i.insumo_monto||0) };
      if(i.excluido) fuera.push(fila);
      else if(estadoDe[i.presupuesto_id]==='pagado') pagado.push(fila);
      else pendiente.push(fila);
    });

    function bloque(cls, etiqueta, arr){
      if(!arr.length) return '';
      return '<div class="hoy-b '+cls+'"><div class="hoy-et">'+etiqueta+'</div>'
           + arr.map(function(f){
               return '<div class="hoy-l"><span>'+f.nombre+'</span><span class="m">'+clp(f.monto)+'</span></div>';
             }).join('') + '</div>';
    }
    var html = '<div class="hoy-tit">Atención de hoy</div>'
             + bloque('ok','Pagado', pagado)
             + bloque('pe','Pendiente de pago', pendiente)
             + bloque('no','No realiza hoy', fuera);
    if(!pagado.length && !pendiente.length && !fuera.length)
      html += '<div class="hoy-vacio">Sin prestaciones registradas.</div>';
    box.className = 'hoy show';
    box.innerHTML = html;
  }catch(e){
    box.className = 'hoy show';
    box.innerHTML = '<div class="hoy-tit">Atención de hoy</div>'
                  + '<div class="hoy-vacio">No se pudo consultar: '+(e.message||e)+'</div>';
  }
}

function agregar(col){
  const sel = $(col==='r'?'sel-r':'sel-n');
  const pid = parseInt(sel.value,10);
  if(!pid){ return; }
  const p = CATALOGO.find(x=>x.id===pid);
  if(!p) return;
  cesta[col].push(p);
  sel.value='';
  render(col);
}

function quitar(col, idx){ cesta[col].splice(idx,1); render(col); }

function render(col){
  const cont = $(col==='r'?'items-r':'items-n');
  const arr = cesta[col];
  if(!arr.length){ cont.innerHTML='<div class="vacio">Sin prestaciones</div>'; }
  else cont.innerHTML = arr.map((p,i)=>
    '<div class="item"><div class="nm">'+p.nombre+' <span class="c">'+(p.codigo||'')+'</span></div>'
    + '<span class="mo">'+clp((p.honorario_monto||0)+(p.insumo_monto||0))+'</span>'
    + '<button class="del" onclick="quitar(\''+col+'\','+i+')">×</button></div>'
  ).join('');

  const hon = arr.reduce((s,p)=>s+(p.honorario_monto||0),0);
  const ins = arr.reduce((s,p)=>s+(p.insumo_monto||0),0);
  $(col==='r'?'tot-r':'tot-n').innerHTML = arr.length ? (
    '<div class="l"><span>Honorario · SkinTouch</span><span>'+clp(hon)+'</span></div>'
    + '<div class="l"><span>Insumo · LaserTouch</span><span>'+clp(ins)+'</span></div>'
    + '<div class="l g"><span>Total</span><span class="v">'+clp(hon+ins)+'</span></div>'
  ) : '';
  refrescarBotones();
}

function refrescarBotones(){
  $('btn-r').disabled = !(PAC && cesta.r.length);
  $('btn-n').disabled = !(PAC && cesta.n.length);
}

async function enviar(col){
  if(!PAC){ alert('Primero busca a la paciente por RUT.'); return; }
  const arr = cesta[col];
  if(!arr.length) return;
  const esReemb = (col==='r');
  const hon = arr.reduce((s,p)=>s+(p.honorario_monto||0),0);
  const ins = arr.reduce((s,p)=>s+(p.insumo_monto||0),0);
  const total = hon+ins;
  const btn = $(col==='r'?'btn-r':'btn-n'); btn.disabled=true;

  try{
    // 1) Crear el presupuesto (el tótem lo lee por RUT). creado_por='Dirección'
    const { data:pres, error:e1 } = await sb.from('presupuestos').insert({
      paciente_rut: PAC.rut, estado:'aceptado', reserva:0, total: total, saldo: total,
      creado_por:'Dirección', fecha: new Date().toISOString()
    }).select().single();
    if(e1) throw e1;

    // 2) Crear los ítems del presupuesto
    const items = arr.map(p => ({
      presupuesto_id: pres.id, prestacion_id: p.id,
      honorario_monto: p.honorario_monto||0, insumo_monto: p.insumo_monto||0,
      reembolsable: !!p.reembolsable
    }));
    const { error:e2 } = await sb.from('presupuesto_items').insert(items);
    if(e2) throw e2;

    log('Enviado al tótem · '+(esReemb?'Reembolsable':'No reembolsable')+' · '
      + PAC.nombre+' · '+clp(total)+' (presupuesto #'+pres.id+')','l-ok');
    // limpiar la columna
    cesta[col]=[]; render(col);
    alert('Listo. La paciente ya puede pagar esta atención en el tótem ingresando su RUT.');
  }catch(err){
    log('enviar → '+(err.message||err),'l-mal');
    alert('Error: '+(err.message||err));
    btn.disabled=false;
  }
}

init();
</script>
</body>
</html>
