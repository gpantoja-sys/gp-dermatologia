<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago · 2do piso · GP Dermatología</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --crema:#f4efe7; --crema2:#fbf8f2; --verde:#1f3d34; --verde2:#2c5446;
    --tinta:#26201a; --suave:#8a8076; --linea:#e3dccf;
    --reemb:#2f6d8a; --noreemb:#8a6d2f; --ok:#2f7d5b; --mal:#b23b3b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--crema);color:var(--tinta);font-family:'Inter',system-ui,sans-serif;
    line-height:1.5;display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh}
  .scr{display:none;width:100%;max-width:560px;animation:fade .25s ease}
  .scr.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h1{font-family:'Playfair Display',serif;font-weight:600;color:var(--verde);font-size:30px;text-align:center;margin-bottom:6px}
  .lead{text-align:center;color:var(--suave);font-size:15px;margin-bottom:26px}

  /* RUT */
  .rut-box{background:var(--crema2);border:1px solid var(--linea);border-radius:20px;padding:30px 26px;text-align:center}
  .rut-box input{width:100%;font-family:ui-monospace,monospace;font-size:30px;text-align:center;letter-spacing:.04em;
    padding:16px;border:1px solid var(--linea);border-radius:14px;background:#fff;color:var(--tinta);margin-bottom:18px}
  .btn{width:100%;font-family:inherit;font-size:18px;font-weight:600;border-radius:14px;padding:17px;
    border:none;background:var(--verde);color:#fff;cursor:pointer}
  .btn:active{background:var(--verde2)}
  .btn.sec{background:transparent;border:1px solid var(--suave);color:var(--verde)}
  .btn:disabled{opacity:.45}
  .msg{font-size:14px;color:var(--mal);margin-top:14px;min-height:18px}

  /* atenciones */
  .hola{font-family:'Playfair Display',serif;font-size:24px;color:var(--verde);text-align:center;margin-bottom:4px}
  .sub{text-align:center;color:var(--suave);font-size:14px;margin-bottom:22px}
  .at{background:var(--crema2);border:1px solid var(--linea);border-radius:18px;padding:20px;margin-bottom:14px}
  .at.reemb{border-top:3px solid var(--reemb)} .at.noreemb{border-top:3px solid var(--noreemb)}
  .at .tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    border-radius:99px;padding:3px 11px;margin-bottom:10px}
  .at.reemb .tag{background:#e7f0f4;color:var(--reemb)} .at.noreemb .tag{background:#f3ecdd;color:var(--noreemb)}
  .at .li{font-size:14px;color:var(--tinta);padding:3px 0}
  .at .li .c{font-size:11px;color:var(--suave);font-family:ui-monospace,monospace}
  .at .tot{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--linea);
    margin-top:12px;padding-top:12px}
  .at .tot .l{font-size:13px;color:var(--suave)}
  .at .tot .v{font-family:'Playfair Display',serif;font-size:26px;color:var(--tinta)}
  .at .btn{margin-top:14px}

  /* QR */
  .qr-wrap{background:var(--crema2);border:1px solid var(--linea);border-radius:20px;padding:28px;text-align:center}
  .qr-emp{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--suave)}
  .qr-amt{font-family:'Playfair Display',serif;font-size:34px;color:var(--tinta);margin:2px 0 18px}
  #qr{display:inline-block;background:#fff;padding:16px;border-radius:14px;line-height:0}
  #qr img,#qr canvas{display:block}
  .qr-note{font-size:14px;color:var(--suave);line-height:1.55;margin:18px auto 0;max-width:380px}
  .esperando{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:18px;color:var(--verde);font-weight:500;font-size:14px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--verde);animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

  /* pagado */
  .ok-wrap{text-align:center;background:var(--crema2);border:1px solid var(--linea);border-radius:20px;padding:40px 26px}
  .ok-ic{width:84px;height:84px;border-radius:50%;background:rgba(47,125,91,.12);color:var(--ok);
    font-size:42px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
  .ok-wrap h1{margin-bottom:8px}
</style>
</head>
<body>

  <!-- 1 · RUT -->
  <div class="scr on" id="s1">
    <h1>Pago de atención</h1>
    <div class="lead">2do piso · Dr. Gonzalo Pantoja</div>
    <div class="rut-box">
      <input id="rut" inputmode="text" autocomplete="off" placeholder="12.345.678-9">
      <button class="btn" onclick="buscar()">Continuar</button>
      <div class="msg" id="msg1"></div>
    </div>
  </div>

  <!-- 2 · atenciones pendientes -->
  <div class="scr" id="s2">
    <div class="hola" id="hola">Hola</div>
    <div class="sub">Elige la atención que vas a pagar</div>
    <div id="ats"></div>
    <button class="btn sec" onclick="reset()">Volver</button>
  </div>

  <!-- 3 · QR -->
  <div class="scr" id="s3">
    <div class="qr-wrap">
      <div class="qr-emp" id="qr-emp">WebPay</div>
      <div class="qr-amt" id="qr-amt">$0</div>
      <div id="qr"></div>
      <div class="qr-note">Escanea este código con la <b>cámara de tu teléfono</b> y paga con WebPay. No cierres esta pantalla.</div>
      <div class="esperando"><span class="dot"></span> Esperando el pago…</div>
      <button class="btn sec" style="margin-top:22px" onclick="cancelar()">Cancelar</button>
    </div>
  </div>

  <!-- 4 · pagado -->
  <div class="scr" id="s4">
    <div class="ok-wrap">
      <div class="ok-ic">✓</div>
      <h1>¡Pago recibido!</h1>
      <div class="lead" style="margin-bottom:24px">Tu atención quedó pagada. Ya puedes comenzar.</div>
      <button class="btn" id="btn-otra" onclick="otra()" style="margin-bottom:10px">Pagar otra atención</button>
      <button class="btn sec" onclick="reset()">Terminar</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const SUPABASE_URL = 'https://nirxkzkfcctdigvuapuc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pcnhremtmY2N0ZGlndnVhcHVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDY5MTUsImV4cCI6MjA5NTEyMjkxNX0.iGTkHTRgdsEDoUsvS9ApQtSRAJV52z-_IASlFBmPqDM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = id => document.getElementById(id);
const clp = n => '$' + (n||0).toLocaleString('es-CL');
function show(s){ ['s1','s2','s3','s4'].forEach(x=>$(x).classList.toggle('on', x===s)); }

function normRut(v){
  let s=(v||'').toString().trim().toUpperCase().replace(/\./g,'').replace(/\s/g,'');
  if(s.indexOf('-')<0 && s.length>1) s = s.slice(0,-1)+'-'+s.slice(-1);
  return s;
}

let PAC=null, PENDIENTES=[], pollTimer=null, accionActiva=null;

async function buscar(){
  const rut = normRut($('rut').value);
  $('rut').value = rut;
  $('msg1').textContent='';
  if(!rut || rut.length<3){ $('msg1').textContent='Ingresa tu RUT (ej: 12.345.678-9).'; return; }

  const { data:pac } = await sb.from('pacientes').select('rut,nombre,apellido').eq('rut',rut).maybeSingle();
  if(!pac){ $('msg1').textContent='No encontramos ese RUT. Verifica o acércate a recepción.'; return; }
  PAC = pac;

  await cargarPendientes();
  if(!PENDIENTES.length){
    $('msg1').textContent='No tienes atenciones pendientes de pago.';
    return;
  }
  $('hola').textContent = 'Hola, ' + (pac.nombre||'').split(' ')[0];
  show('s2');
}

async function cargarPendientes(){
  PENDIENTES=[];
  const { data:pres } = await sb.from('presupuestos')
    .select('id,total,estado,fecha')
    .eq('paciente_rut', PAC.rut).in('estado',['borrador','aceptado'])
    .order('fecha',{ascending:true});
  if(!pres || !pres.length) return;
  for(const p of pres){
    const { data:items } = await sb.from('presupuesto_items')
      .select('honorario_monto,insumo_monto,reembolsable,prestaciones(nombre,codigo)')
      .eq('presupuesto_id', p.id);
    const its = items||[];
    if(!its.length) continue;
    const hon = its.reduce((s,i)=>s+(i.honorario_monto||0),0);
    const ins = its.reduce((s,i)=>s+(i.insumo_monto||0),0);
    const reemb = its.some(i=>i.reembolsable);
    PENDIENTES.push({ id:p.id, total:p.total||(hon+ins), hon, ins, reemb, items:its });
  }
  renderAts();
}

function renderAts(){
  $('ats').innerHTML = PENDIENTES.map((a,idx)=>{
    const cls = a.reemb ? 'reemb' : 'noreemb';
    const tag = a.reemb ? 'Reembolsable' : 'No reembolsable';
    const lis = a.items.map(i=>{
      const pr = i.prestaciones || {};
      return '<div class="li">'+(pr.nombre||'Prestación')+' <span class="c">'+(pr.codigo||'')+'</span></div>';
    }).join('');
    return '<div class="at '+cls+'"><span class="tag">'+tag+'</span>'+lis
      + '<div class="tot"><span class="l">Total a pagar</span><span class="v">'+clp(a.total)+'</span></div>'
      + '<button class="btn" onclick="pagar('+idx+')">Pagar con WebPay</button></div>';
  }).join('');
}

async function pagar(idx){
  const a = PENDIENTES[idx];
  if(!a) return;

  // 1) Crear la acción en la cola de Clarita (la ve y se cierra sola al pagar)
  const concepto = a.items.map(i=>(i.prestaciones||{}).nombre).filter(Boolean).join(' + ').slice(0,120) || 'Atención 2do piso';
  let accion_id = null;
  try{
    const { data:acc } = await sb.from('clarita_acciones').insert({
      paciente_rut: PAC.rut, tipo:'pago', estado:'pendiente', canal:'totem2',
      detalle:{ nombre:[PAC.nombre,PAC.apellido].filter(Boolean).join(' '), descripcion:concepto,
                honorario:a.hon, insumo:a.ins, reembolsable:a.reemb, presupuesto_id:a.id, origen:'Dirección' }
    }).select().single();
    accion_id = acc ? acc.id : null;
  }catch(e){ /* si falla, igual cobramos; la caja recibe el cobro vía WebPay */ }
  accionActiva = accion_id;

  // 2) Armar los legs (honorario→SkinTouch, insumo→LaserTouch) y crear el primer pago
  const grupo = 'G-' + Date.now();
  const legs = [];
  if(a.hon>0) legs.push({ empresa:'skintouch',  monto:a.hon, concepto:concepto });
  if(a.ins>0) legs.push({ empresa:'lasertouch', monto:a.ins, concepto:'Insumos · '+concepto });
  if(!legs.length){ alert('Esta atención no tiene monto.'); return; }

  try{
    const r = await fetch('/api/transbank-crear', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        empresa: legs[0].empresa, monto: legs[0].monto, concepto: legs[0].concepto,
        paciente_rut: PAC.rut, grupo: grupo, pendientes: legs.slice(1),
        accion_id: accion_id, presupuesto_id: a.id
      })
    });
    const data = await r.json();
    if(!data.token){ alert('No se pudo iniciar el pago. Intenta de nuevo o acércate a recepción.'); return; }

    // 3) Mostrar el QR real apuntando a la página puente /api/pagar
    $('qr-emp').textContent = a.reemb ? 'Reembolsable' : 'No reembolsable';
    $('qr-amt').textContent = clp(a.total);
    $('qr').innerHTML = '';
    new QRCode($('qr'), {
      text: window.location.origin + '/api/pagar?tk=' + data.token,
      width: 240, height: 240, colorDark:'#1c2b1e', colorLight:'#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    show('s3');
    esperarPago(a.id);
  }catch(e){ alert('Error: '+(e.message||e)); }
}

// Espera el pago consultando el estado del presupuesto (lo cierra el enganche)
function esperarPago(presupuestoId){
  clearInterval(pollTimer);
  pollTimer = setInterval(async ()=>{
    const { data } = await sb.from('presupuestos').select('estado').eq('id',presupuestoId).maybeSingle();
    if(data && data.estado==='pagado'){
      clearInterval(pollTimer);
      show('s4');
    }
  }, 3000);
}

function cancelar(){ clearInterval(pollTimer); show('s2'); }

async function otra(){
  clearInterval(pollTimer);
  await cargarPendientes();
  if(PENDIENTES.length){ show('s2'); }
  else { reset(); }
}

function reset(){
  clearInterval(pollTimer);
  PAC=null; PENDIENTES=[]; accionActiva=null;
  $('rut').value=''; $('msg1').textContent='';
  show('s1');
}
</script>
</body>
</html>
