<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#111;color:#fff;min-height:100vh}
.hidden{display:none!important}
.btn{padding:9px 16px;border-radius:14px;border:1px solid #333;background:#1c1c1e;color:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;font-family:inherit;font-weight:500}
.btn:hover{background:#2a2a2c}
.btn-white{background:#fff;color:#111;border-color:#fff;border-radius:16px}.btn-white:hover{background:#e8e8e8}
.btn-dark{background:#2c2c2e;color:#fff;border-color:#3a3a3c;border-radius:16px}.btn-dark:hover{background:#3a3a3c}
.btn-danger{background:#3a1a1a;color:#ff6b6b;border-color:#5a2a2a}
.btn-green{background:#1a3a1a;color:#6bcb77;border-color:#2a5a2a}
.sm{padding:6px 12px;font-size:12px}
.card{background:#1c1c1e;border:1px solid #2c2c2e;border-radius:16px;padding:16px}
.card-light{background:#2c2c2e;border:1px solid #3a3a3c;border-radius:12px;padding:12px 14px}
.inp,.sel,.ta{width:100%;padding:12px 14px;border:1px solid #3a3a3c;border-radius:12px;font-size:14px;background:#2c2c2e;color:#fff;font-family:inherit}
.inp::placeholder{color:#666}
.inp:focus,.sel:focus,.ta:focus{outline:none;border-color:#888}
.sel option{background:#2c2c2e;color:#fff}
.ta{resize:vertical}
.lbl{font-size:11px;color:#888;display:block;margin-bottom:6px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tb{background:#1e2a3a;color:#7eb8f7}.tg{background:#1a2e1a;color:#6bcb77}
.ta2{background:#2e2010;color:#f0a44a}.tt{background:#0f2e28;color:#4ecdc4}
.tp{background:#22103a;color:#c4a0f0}.tgr{background:#2a2a2c;color:#aaa}
.topbar{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:#1a1a1a;border-bottom:1px solid #2a2a2a}
.tabbar{display:flex;gap:4px;padding:8px 12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 14px;font-size:12px;white-space:nowrap;border-radius:10px;border:1px solid transparent;background:transparent;cursor:pointer;color:#888;font-family:inherit;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.tab:hover{background:#2a2a2c;color:#ccc}
.tab.on{background:#2c2c2e;border-color:#3a3a3c;color:#fff}
.pnl{padding:14px;background:#111;min-height:400px}
.met{background:#1c1c1e;border:1px solid #2c2c2e;border-radius:12px;padding:14px;text-align:center}
.mv{font-size:22px;font-weight:700;color:#fff}.ml{font-size:11px;color:#888;margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.g2{grid-template-columns:1fr}}
.row{background:#1c1c1e;border:1px solid #2c2c2e;border-radius:12px;padding:12px 14px}
.av{width:38px;height:38px;border-radius:50%;background:#2c2c2e;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#ccc;flex-shrink:0}
.ok{font-size:13px;color:#6bcb77;padding:10px 14px;background:#1a2e1a;border-radius:10px;margin-top:8px;border:1px solid #2a5a2a}
.er{font-size:13px;color:#ff6b6b;padding:10px 14px;background:#2e1010;border-radius:10px;margin-top:8px;border:1px solid #5a2020}
.drop{border:2px dashed #3a3a3c;border-radius:14px;padding:2rem;text-align:center;cursor:pointer}
.drop:hover{background:#1c1c1e}
.bar{height:5px;background:#2a2a2c;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:#fff;border-radius:3px}
.home-screen{min-height:100vh;background:linear-gradient(180deg,#1a1a1a 0%,#111 60%);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 28px 48px;text-align:center;position:relative;overflow:hidden}
.home-screen::before{content:'';position:absolute;top:-60%;left:-60%;width:60%;height:200%;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.055) 50%,transparent 60%);transform:skewX(-15deg);animation:shimmer 5s ease-in-out infinite;pointer-events:none;z-index:1}
@keyframes shimmer{0%{left:-60%;top:-60%}60%{left:130%;top:130%}100%{left:130%;top:130%}}
.home-avatar{width:90px;height:90px;border-radius:50%;background:#0a0a0a;border:3px solid #2a2a2a;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative}
.home-avatar::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1.5px solid #333}
.home-ring-outer{position:absolute;inset:-14px;border-radius:50%;border:1px solid #222}
.home-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:12px;line-height:1.2}
.home-sep{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 14px}
.home-sep::before,.home-sep::after{content:'';width:28px;height:1px;background:#444}
.home-diamond{width:5px;height:5px;background:#555;transform:rotate(45deg)}
.home-spec{font-size:13px;color:#777;letter-spacing:1px;margin-bottom:16px}
.home-desc{font-size:15px;color:#555;line-height:1.65;max-width:320px;margin:0 auto}
.home-btns{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:auto}
.hbp{width:100%;padding:17px;font-size:16px;font-weight:600;justify-content:center;background:#fff;color:#111;border:none;border-radius:16px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.hbp:hover{background:#e8e8e8}
.hbs{width:100%;padding:17px;font-size:16px;font-weight:600;justify-content:center;background:#2a2a2c;color:#fff;border:none;border-radius:16px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.hbs:hover{background:#333}
.home-admin{font-size:12px;color:#555;margin-top:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.home-admin:hover{color:#888}
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;gap:10px;color:#666;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid #333;border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#pd{margin-top:10px}
table{border-collapse:collapse;width:100%}
th,td{padding:7px 9px;text-align:left;border:1px solid #2a2a2a;font-size:12px}
th{background:#1c1c1e;font-weight:500;color:#ccc}td{color:#ddd}
.logo-gp{font-size:28px;font-weight:300;color:#fff;letter-spacing:4px}
</style>

async function verificar(){
  const nInput=document.getElementById('pn').value.trim();
  const rInput=document.getElementById('pr').value.trim();
  if(!nInput||!rInput){ showMsg('pm','er','Complete nombre y RUT.'); return; }
  const rNorm=rInput.replace(/\./g,'').replace(/\s/g,'').toLowerCase();
  document.getElementById('bv').textContent='Verificando...';
  document.getElementById('bv').disabled=true;
  // Buscar todos los pacientes con ese RUT (tolerante a formato)
  const { data, error } = await db.from('pacientes').select('*');
  document.getElementById('bv').textContent='Verificar identidad';
  document.getElementById('bv').disabled=false;
  if(error){ showMsg('pm','er','Error de conexión. Intente nuevamente.'); return; }
  const p = data.find(x => {
    const xRut=x.rut.replace(/\./g,'').replace(/\s/g,'').toLowerCase();
    if(xRut!==rNorm) return false;
    const wi=normalizar(nInput).split(' ').filter(Boolean);
    const wp=normalizar(x.nombre).split(' ').filter(Boolean);
    const min=Math.min(2,wi.length);
    return wi.filter(w=>wp.includes(w)).length>=min;
  });
  if(!p){
    const solo=data.find(x=>x.rut.replace(/\./g,'').replace(/\s/g,'').toLowerCase()===rNorm);

function rowsPt(data){
  if(!data.length) return '<p style="font-size:13px;color:#666;padding:20px 0;text-align:center">Sin pacientes.</p>';
  return data.map(p=>{
    const e=edad(p.nac);

      <div class="av">${ini(p.nombre)}</div>

        </div>
        <p style="font-size:11px;color:#666;margin-top:2px">RUT: ${p.rut} · ${e!==null?e+' años':'—'} · ${p.comuna||'—'}</p>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">
          ${p.tel?`<span class="tag tt">📞 ${p.pais||''} ${p.tel}</span>`:''}

      </div>
    </div>`;
  }).join('');
}

function filtrarPts(){
  const q=(document.getElementById('bq').value||'').toLowerCase();
  const fc=document.getElementById('fc').value;
  const fe=document.getElementById('fe').value;
  const data=(window._pacientes||[]).filter(p=>{
    const o1=!q||(p.nombre.toLowerCase().includes(q)||p.rut.includes(q));
    const o2=!fc||p.comuna===fc;
    let o3=true; if(fe){const e=edad(p.nac)||0;const[a,b]=fe.split('-').map(Number);o3=e>=a&&e<=b;}
    return o1&&o2&&o3;
  });
  document.getElementById('pl').innerHTML=rowsPt(data);
  document.getElementById('pd').classList.add('hidden');
}

  el.innerHTML=`<div class="card" style="max-width:500px;display:flex;flex-direction:column;gap:13px">
    <p style="font-size:11px;color:#666;letter-spacing:1.5px;text-transform:uppercase">Registrar Tratamiento</p>
    <div><label class="lbl">Paciente *</label><select id="tp" class="sel"><option value="">Seleccionar...</option>${(pts||[]).map(p=>`<option value="${p.rut}">${p.nombre} (${p.rut})</option>`).join('')}</select></div>
    <div class="g2">
      <div><label class="lbl">Fecha *</label><input id="tf" class="inp" type="date" value="${today()}"></div>
      <div><label class="lbl">Próximo control</label><input id="tpx" class="inp" type="date"></div>
    </div>
    <div><label class="lbl">Tipo de tratamiento *</label>
      <select id="tt2" class="sel"><option value="">Seleccionar...</option>
        <option>Toxina botulínica (Botox)</option><option>Ácido hialurónico</option><option>Peeling químico</option>
        <option>Láser fraccionado</option><option>Láser Nd:YAG</option><option>Radiofrecuencia</option>
        <option>Mesoterapia</option><option>Biopsia dermatológica</option><option>Crioterapia</option>
        <option>Tratamiento de acné</option><option>Hydrafacial</option><option>Dermapen / Microneedling</option>
        <option>Biostimulador de colágeno (Sculptra)</option><option>Terapia con exosomas</option><option>Otro</option>
      </select>
    </div>
    <div><label class="lbl">Notas clínicas</label><textarea id="tn2" class="ta" rows="4" placeholder="Área, dosis, observaciones..."></textarea></div>
    <div id="tmsg" class="hidden"></div>
    <button class="btn btn-white" onclick="gTrato()">✓ Registrar tratamiento</button>
  </div>`;
}

async function gTrato(){
  const rut=document.getElementById('tp').value, f=document.getElementById('tf').value, tipo=document.getElementById('tt2').value;
  if(!rut||!f||!tipo){ showMsg('tmsg','er','Seleccione paciente, fecha y tipo.'); return; }
  const { error } = await db.from('tratamientos').insert({ paciente_rut:rut, fecha:f, tipo, nota:document.getElementById('tn2').value.trim(), proximo:document.getElementById('tpx').value||null });
  if(error){ showMsg('tmsg','er','Error: '+error.message); return; }
  showMsg('tmsg','ok','✓ Tratamiento registrado correctamente.');
  setTimeout(()=>{ DT='trato'; rDocPanel(); }, 1400);
}

// TAB NOTIFICACIÓN
async function tNotif(el){
  const { data:pts } = await db.from('pacientes').select('rut,nombre').order('nombre');
  const { data:notifs } = await db.from('notificaciones').select('*').order('fecha',{ascending:false});
  el.innerHTML=`<div class="card" style="max-width:500px;display:flex;flex-direction:column;gap:13px;margin-bottom:12px">
    <p style="font-size:11px;color:#666;letter-spacing:1.5px;text-transform:uppercase">Enviar Notificación</p>
    <div><label class="lbl">Destinatario</label><select id="ndd" class="sel"><option value="todos">📢 Todos los pacientes</option>${(pts||[]).map(p=>`<option value="${p.rut}">${p.nombre}</option>`).join('')}</select></div>
    <div><label class="lbl">Tipo</label><select id="nti" class="sel"><option>Recordatorio de control</option><option>Repetir tratamiento</option><option>Nuevo tratamiento disponible</option><option>Información importante</option><option>Promoción especial</option></select></div>
    <div><label class="lbl">Mensaje</label><textarea id="ntx" class="ta" rows="4" placeholder="Escriba el mensaje..."></textarea></div>
    <div id="nmg2" class="hidden"></div>
    <button class="btn btn-white" onclick="gNotif()">📨 Enviar notificación</button>
  </div>
  <div class="card" style="max-width:500px">
    <p style="font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Historial (${(notifs||[]).length})</p>
    ${(notifs||[]).map(n=>`<div class="card-light" style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;gap:6px;flex-wrap:wrap;margin-bottom:4px">
        <span class="tag ${n.tipo.includes('Nuevo')?'tt':n.tipo.includes('Repetir')?'ta2':'tb'}">${n.tipo}</span>
        <span style="font-size:11px;color:#666">${n.dest==='todos'?'Todos':n.dest} · ${fd(n.fecha)}</span>
      </div>
      <p style="color:#888;font-size:12px">${n.txt.slice(0,100)}${n.txt.length>100?'...':''}</p>
    </div>`).join('')}
  </div>`;
}

async function gNotif(){
  const txt=document.getElementById('ntx').value.trim();
  if(!txt){ showMsg('nmg2','er','Escriba un mensaje.'); return; }
  const { error } = await db.from('notificaciones').insert({ dest:document.getElementById('ndd').value, tipo:document.getElementById('nti').value, txt, fecha:today() });
  if(error){ showMsg('nmg2','er','Error: '+error.message); return; }
  showMsg('nmg2','ok','✓ Notificación enviada.');
  setTimeout(()=>{ DT='notif'; rDocPanel(); }, 1200);
}

async function gNov(){
  const titulo=document.getElementById('nvt').value.trim(), descripcion=document.getElementById('nvd').value.trim();
  if(!titulo||!descripcion){ showMsg('nvmsg','er','Complete título y descripción.'); return; }
  const { error } = await db.from('novedades').insert({ titulo, descripcion, fecha:today() });
  if(error){ showMsg('nvmsg','er','Error: '+error.message); return; }
  showMsg('nvmsg','ok','✓ Novedad publicada.');
  setTimeout(()=>{ DT='nov'; rDocPanel(); }, 1200);
}

// TAB STATS
async function tStats(el){
  const { data:pts } = await db.from('pacientes').select('nac,sexo,comuna,email');
  const { data:trts } = await db.from('tratamientos').select('tipo,paciente_rut');
  const data=pts||[], tot=data.length;
  const edades=data.map(p=>edad(p.nac)).filter(e=>e!==null);
  const pr=edades.length?Math.round(edades.reduce((a,b)=>a+b,0)/edades.length):0;
  const fem=data.filter(p=>p.sexo==='Femenino').length;
  const ce=data.filter(p=>p.email).length;
  const totalT=(trts||[]).length;
  const pc={};data.forEach(p=>{if(p.comuna)pc[p.comuna]=(pc[p.comuna]||0)+1;});
  const cs=Object.entries(pc).sort((a,b)=>b[1]-a[1]);
  const rg=[['Hasta 30',0],['31–45',0],['46–60',0],['Más de 60',0]];
  data.forEach(p=>{const e=edad(p.nac);if(e===null)return;if(e<=30)rg[0][1]++;else if(e<=45)rg[1][1]++;else if(e<=60)rg[2][1]++;else rg[3][1]++;});
  const tt={};(trts||[]).forEach(t=>{tt[t.tipo]=(tt[t.tipo]||0)+1;});
  const ts=Object.entries(tt).sort((a,b)=>b[1]-a[1]).slice(0,6);
  el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px">
    <div class="met"><div class="mv">${tot}</div><div class="ml">Total</div></div>
    <div class="met"><div class="mv">${pr}</div><div class="ml">Edad prom.</div></div>
    <div class="met"><div class="mv">${fem}</div><div class="ml">Mujeres</div></div>
    <div class="met"><div class="mv">${tot-fem}</div><div class="ml">Hombres</div></div>
    <div class="met"><div class="mv">${ce}</div><div class="ml">Con email</div></div>
    <div class="met"><div class="mv">${totalT}</div><div class="ml">Tratamientos</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
    <div class="card"><p style="font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Por comuna</p>
      ${cs.map(([c,n])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #222;font-size:12px"><span class="tag ${ctag(c)}">${c}</span><span style="font-weight:600;color:#fff">${n}</span></div>`).join('')}
    </div>
    <div class="card"><p style="font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Por edad</p>
      ${rg.map(([r,n])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#888">${r}</span><span style="font-weight:600;color:#fff">${n}</span></div><div class="bar"><div class="bar-fill" style="width:${tot?Math.round(n/tot*100):0}%"></div></div></div>`).join('')}
    </div>
    <div class="card"><p style="font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Más frecuentes</p>
      ${ts.map(([t,n])=>`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:#aaa">${t.length>22?t.slice(0,22)+'…':t}</span><span style="font-weight:600;color:#fff">${n}</span></div><div class="bar"><div class="bar-fill" style="width:${Math.round(n/(ts[0]?ts[0][1]:1)*100)}%"></div></div></div>`).join('')}
    </div>
  </div>`;
}


function logout(){ 
  localStorage.removeItem('gp_session'); 
  S.pt=null; 
  go('home'); 
}

// Restore session on app load - fetch fresh data from Supabase
async function restoreSession() {
  const saved = localStorage.getItem('gp_session');
  if(saved) {
    try {
      const sess = JSON.parse(saved);
      if(sess && sess.rut) {
        // Fetch fresh patient data from DB
        const { data, error } = await db.from('pacientes').select('*').eq('rut', sess.rut).single();
        if(data && !error) {
          // Verify password matches
          if(data.pass && data.pass === sess.pass) {
            S.pt = data;
            S.scr = 'ptd';
            render();
            return;
          }
        }
      }
    } catch(e) {}
    // If restore failed, clear and show home
    localStorage.removeItem('gp_session');
  }
  render();
}

restoreSession();
