<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#111;color:#fff;min-height:100vh}
.hidden{display:none!important}
.btn{padding:9px 16px;border-radius:14px;border:1px solid #333;background:#1c1c1e;color:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;font-family:inherit;font-weight:500}
.btn:hover{background:#2a2a2c}
.btn-white{background:#fff;color:#111;border-color:#fff;border-radius:16px}.btn-white:hover{background:#e8e8e8}
.btn-dark{background:#2c2c2e;color:#fff;border-color:#3a3a3c;border-radius:16px}.btn-dark:hover{background:#3a3a3c}
.btn-danger{background:#3a1a1a;color:#ff6b6b;border-color:#5a2a2a}
.btn-green{background:#1a3a1a;color:#6bcb77;border-color:#2a5a2a}
.sm{padding:6px 12px;font-size:12px}
.card{background:#1c1c1e;border:1px solid #2c2c2e;border-radius:16px;padding:16px}
.card-light{background:#2c2c2e;border:1px solid #3a3a3c;border-radius:12px;padding:12px 14px}
.inp,.sel,.ta{width:100%;padding:12px 14px;border:1px solid #3a3a3c;border-radius:12px;font-size:14px;background:#2c2c2e;color:#fff;font-family:inherit}
.inp::placeholder{color:#666}
.inp:focus,.sel:focus,.ta:focus{outline:none;border-color:#888}
.sel option{background:#2c2c2e;color:#fff}
.ta{resize:vertical}
.lbl{font-size:11px;color:#888;display:block;margin-bottom:6px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tb{background:#1e2a3a;color:#7eb8f7}.tg{background:#1a2e1a;color:#6bcb77}
.ta2{background:#2e2010;color:#f0a44a}.tt{background:#0f2e28;color:#4ecdc4}
.tp{background:#22103a;color:#c4a0f0}.tgr{background:#2a2a2c;color:#aaa}
.topbar{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:#1a1a1a;border-bottom:1px solid #2a2a2a}
.tabbar{display:flex;gap:4px;padding:8px 12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 14px;font-size:12px;white-space:nowrap;border-radius:10px;border:1px solid transparent;background:transparent;cursor:pointer;color:#888;font-family:inherit;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.tab:hover{background:#2a2a2c;color:#ccc}
.tab.on{background:#2c2c2e;border-color:#3a3a3c;color:#fff}
.pnl{padding:14px;background:#111;min-height:400px}
.met{background:#1c1c1e;border:1px solid #2c2c2e;border-radius:12px;padding:14px;text-align:center}
.mv{font-size:22px;font-weight:700;color:#fff}.ml{font-size:11px;color:#888;margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.g2{grid-template-columns:1fr}}
.row{background:#1c1c1e;border:1px solid #2c2c2e;border-radius:12px;padding:12px 14px}
.av{width:38px;height:38px;border-radius:50%;background:#2c2c2e;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#ccc;flex-shrink:0}
.ok{font-size:13px;color:#6bcb77;padding:10px 14px;background:#1a2e1a;border-radius:10px;margin-top:8px;border:1px solid #2a5a2a}
.er{font-size:13px;color:#ff6b6b;padding:10px 14px;background:#2e1010;border-radius:10px;margin-top:8px;border:1px solid #5a2020}
.drop{border:2px dashed #3a3a3c;border-radius:14px;padding:2rem;text-align:center;cursor:pointer}
.drop:hover{background:#1c1c1e}
.bar{height:5px;background:#2a2a2c;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:#fff;border-radius:3px}
.home-screen{min-height:100vh;background:linear-gradient(180deg,#1a1a1a 0%,#111 60%);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:72px 28px 52px;text-align:center;position:relative;overflow:hidden}
.home-screen::before{content:'';position:absolute;top:-60%;left:-60%;width:60%;height:200%;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.055) 50%,transparent 60%);transform:skewX(-15deg);animation:shimmer 5s ease-in-out infinite;pointer-events:none;z-index:1}
@keyframes shimmer{0%{left:-60%;top:-60%}60%{left:130%;top:130%}100%{left:130%;top:130%}}
.home-avatar{width:160px;height:160px;border-radius:50%;background:#0a0a0a;border:2px solid #333;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative;overflow:hidden}
.home-avatar::before{content:'';position:absolute;inset:-9px;border-radius:50%;border:1.5px solid #444}
.home-ring-outer{position:absolute;inset:-14px;border-radius:50%;border:1px solid #222}
.home-title{font-size:26px;font-weight:700;color:#fff;margin-bottom:12px;line-height:1.2}
.home-sep{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 14px}
.home-sep::before,.home-sep::after{content:'';width:28px;height:1px;background:#444}
.home-diamond{width:5px;height:5px;background:#555;transform:rotate(45deg)}
.home-spec{font-size:13px;color:#777;letter-spacing:1px;margin-bottom:16px}
.home-desc{font-size:15px;color:#555;line-height:1.65;max-width:320px;margin:0 auto}
.home-btns{width:100%;display:flex;flex-direction:column;gap:10px;margin-top:28px}
.hbp{width:100%;padding:17px;font-size:16px;font-weight:600;justify-content:center;background:#fff;color:#111;border:none;border-radius:16px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.hbp:hover{background:#e8e8e8}
.hbs{width:100%;padding:17px;font-size:16px;font-weight:600;justify-content:center;background:#2a2a2c;color:#fff;border:none;border-radius:16px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px}
.hbs:hover{background:#333}
.home-admin{font-size:12px;color:#555;margin-top:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.home-admin:hover{color:#888}
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;gap:10px;color:#666;font-size:14px}
.spinner{width:20px;height:20px;border:2px solid #333;border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#pd{margin-top:10px}
table{border-collapse:collapse;width:100%}
th,td{padding:7px 9px;text-align:left;border:1px solid #2a2a2a;font-size:12px}
th{background:#1c1c1e;font-weight:500;color:#ccc}td{color:#ddd}
.logo-gp{font-size:28px;font-weight:300;color:#fff;letter-spacing:4px}
</style>

const edad = n => {
  if(!n) return null;
  let d;
  // Handle YYYY-MM-DD (correct format)
  if(/^\d{4}-\d{2}-\d{2}$/.test(String(n))){
    const parts = String(n).split('-');
    d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  }
  // Handle DD-MM-YYYY or DD/MM/YYYY
  else if(/^\d{2}[-\/]\d{2}[-\/]\d{4}$/.test(String(n))){
    const parts = String(n).split(/[-\/]/);
    d = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
  }
  else { d = new Date(n); }
  if(!d || isNaN(d.getTime())) return null;
  const h = new Date();
  let e = h.getFullYear()-d.getFullYear();
  if(h.getMonth()-d.getMonth()<0||(h.getMonth()===d.getMonth()&&h.getDate()<d.getDate())) e--;
  // Validate reasonable age (0-120)
  if(e < 0 || e > 120) return null;
  return e;
};

function normalizarComuna(raw) {
  if (!raw || typeof raw !== 'string') return null;
  const trimmed = raw.trim();
  if (trimmed.toLowerCase() === 'extranjero') return 'Extranjero';
  const norm = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ').trim();
  const rawN = norm(trimmed);
  // Exact match (case-insensitive)
  const exact = COMUNAS_CHILE.find(c => norm(c) === rawN);
  if (exact) return exact;
  // Partial match (starts with)
  const partial = COMUNAS_CHILE.find(c => norm(c).startsWith(rawN) || rawN.startsWith(norm(c)));
  if (partial) return partial;
  return null; // No es una comuna válida
}

// ── API de autenticación (api/auth.js) — clave + sesión de confianza ──
async function authApi(action, payload){
  const res = await fetch('/api/auth?action='+action, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  return res.json();
}
function guardarSesion(token){
  try{ localStorage.setItem('gp_session', JSON.stringify({ token })); }catch(e){}
}

async function loginRapido(){
  const rInput = document.getElementById('pr-rapido').value.trim();
  const clave  = document.getElementById('pe-rapido').value;
  if(!rInput||!clave){ showMsg('pm-rapido','er','Complete RUT y contraseña.'); return; }
  const btn = document.querySelector('#login-rapido .hbp');
  if(btn){ btn.textContent='Verificando...'; btn.disabled=true; }
  try{
    const r = await authApi('login', { rut: rInput, clave });
    if(r.ok){
      guardarSesion(r.token);
      S.pt = r.paciente;
      go('ptd');
      return;
    }
    const msgs = {
      sin_clave:'Aún no tienes contraseña. Toca "¿Primera vez?" para crearla.',

async function verificar(){
  const nInput=document.getElementById('pn').value.trim();
  const rInput=document.getElementById('pr').value.trim();
  if(!nInput||!rInput){ showMsg('pm','er','Complete nombre y RUT.'); return; }
  const bv=document.getElementById('bv');
  bv.textContent='Verificando...'; bv.disabled=true;
  try{
    const r = await authApi('check', { nombre:nInput, rut:rInput });
    if(!r.ok){
      const msgs={ no_encontrado:'No encontramos ese RUT entre los pacientes del Dr. Pantoja.', nombre_no_coincide:'El RUT existe pero el nombre no coincide. Verifica cómo estás registrado/a.' };
      showMsg('pm','er', msgs[r.reason] || 'No pudimos verificar tu identidad.');
      return;
    }
    if(r.registered){
      showMsg('pm','er','Ya tienes una contraseña creada. Vuelve a "Ya tengo contraseña" e ingresa con ella.');
      return;
    }
    // Identidad verificada y sin clave aún → permitir crearla
    S.pt = { rut: rInput.replace(/\./g,'').replace(/\s/g,'').trim(), nombre: r.nombre, _nombreInput: nInput };
    document.getElementById('pm').classList.add('hidden');
    bv.style.display='none';
    document.getElementById('s2').classList.remove('hidden');
    document.getElementById('cpd').style.display='flex';
  }catch(e){
    showMsg('pm','er','Error de conexión. Intenta nuevamente.');
  }finally{
    bv.textContent='Verificar identidad'; bv.disabled=false;
  }
}

async function crearP(){
  const a=document.getElementById('p1').value, b=document.getElementById('p2').value;
  if(a.length<6){ showMsg('pm','er','Mínimo 6 dígitos.'); return; }
  if(a!==b){ showMsg('pm','er','Las contraseñas no coinciden.'); return; }
  if(!S.pt || !S.pt.rut){ showMsg('pm','er','Vuelve a verificar tu identidad.'); return; }
  try{
    const r = await authApi('register', { nombre: S.pt._nombreInput || S.pt.nombre, rut: S.pt.rut, clave: a });
    if(r.ok){
      guardarSesion(r.token);
      S.pt = r.paciente;
      go('ptd');
      return;
    }
    const msgs={ ya_registrado:'Ya existe una contraseña para este RUT. Ingresa con ella.', no_encontrado:'No encontramos tu RUT en Medilink.', nombre_no_coincide:'El nombre no coincide con el registro.' };
    showMsg('pm','er', msgs[r.reason] || 'No pudimos crear tu contraseña.');
  }catch(e){
    showMsg('pm','er','Error al guardar. Intenta nuevamente.');
  }
}

async function loginP(){
  const pe=document.getElementById('pe').value;
  if(pe!==S.pt.pass){ showMsg('pm','er','Contraseña incorrecta.'); return; }
  go('ptd');
}

function ptProximoCita(trats){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const futuros = (trats||[]).filter(t=>t.proximo && new Date(t.proximo)>=hoy).sort((a,b)=>new Date(a.proximo)-new Date(b.proximo));
  return futuros.length ? futuros[0] : null;
}
function ptDiasRestantes(fecha){
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const f=new Date(fecha); f.setHours(0,0,0,0);
  return Math.ceil((f-hoy)/(1000*60*60*24));
}

// ── TAB REACTIVACIÓN — interesados que mostraron intención pero no asistieron ──
// Se sacan del pipeline del CRM: leads en estados previos a "Asistió"/tratamiento.
const INTERESADO_ESTADOS=['Nuevo lead','Contactado','Calificado','Hora ofrecida','Agendado','Confirmado','Consulta inicial','Paciente antiguo','Reactivación enviada','Respondió'];
async function tReactiv(el){
  let data, error;
  try{
    const r = await db.from('pipeline_registros')
      .select('paciente_id,valor_estimado,fecha_seguimiento,pipeline_id,pacientes(nombre,apellido,rut,tel,comuna,origen),estados(nombre)')
      .eq('activo',true).limit(50000);
    data=r.data; error=r.error;
  }catch(e){ error=e; }
  if(error){ el.innerHTML='<div class="card" style="color:#ff6b6b;padding:20px">No se pudo cargar la lista de reactivación.</div>'; return; }

  const seen=new Set();
  const lista=(data||[]).filter(r=>{
    const est=r.estados&&r.estados.nombre||'';
    if(!INTERESADO_ESTADOS.includes(est)) return false;
    if(seen.has(r.paciente_id)) return false;
    seen.add(r.paciente_id); return true;
  }).map(r=>({
    nombre:[r.pacientes&&r.pacientes.nombre, r.pacientes&&r.pacientes.apellido].filter(Boolean).join(' ')||'—',
    rut:(r.pacientes&&r.pacientes.rut)||'',
    tel:(r.pacientes&&r.pacientes.tel)||'',
    comuna:(r.pacientes&&r.pacientes.comuna)||'',
    origen:(r.pacientes&&r.pacientes.origen)||'',
    estado:(r.estados&&r.estados.nombre)||'',
    fecha:r.fecha_seguimiento||'',
    valor:r.valor_estimado||0
  })).sort((a,b)=> (a.fecha<b.fecha?1:-1));

  const total=lista.length;
  const fmtCLPr=n=>'$'+(Math.round(n)||0).toLocaleString('es-CL');
  const potencial=lista.reduce((a,b)=>a+(b.valor||0),0);
  const msg=encodeURIComponent('Hola! Le escribimos de la consulta del Dr. Gonzalo Pantoja 😊 Vimos que tuvo interés en atenderse con nosotros. ¿Le gustaría que le guardemos una hora? Quedamos atentos para ayudarle.');

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px">
      <div class="met"><div class="mv">${total}</div><div class="ml">Interesados sin asistir</div></div>
      <div class="met"><div class="mv" style="font-size:20px">${total?fmtCLPr(potencial):'—'}</div><div class="ml">Valor potencial</div></div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <p style="font-size:12px;color:#888;line-height:1.5;margin:0">Pacientes que mostraron interés (pidieron hora o entraron al CRM) pero aún no asisten. Están separados de tu base real — dales un empujón por WhatsApp para que finalmente vengan.</p>
    </div>
    ${total===0
      ? '<div class="card" style="text-align:center;color:#888;padding:30px">Aún no hay interesados sin asistir. Aparecerán aquí a medida que Clarita registre leads en el CRM.</div>'
      : `<div style="display:flex;flex-direction:column;gap:8px">${lista.map(p=>{
          const dig=(p.tel||'').replace(/\\D/g,'');
          const num=dig?(dig.startsWith('56')?dig:'56'+dig):'';
          const wa=num?`https://wa.me/${num}?text=${msg}`:'';
          return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:10px">
            <div style="min-width:0">
              <div style="font-weight:600;color:#fff;font-size:14px">${p.nombre}</div>
              <div style="font-size:11px;color:#888;margin-top:2px">${p.estado}${p.comuna?' · '+p.comuna:''}${p.origen?' · '+p.origen:''}${p.fecha?' · '+p.fecha:''}</div>
            </div>
            ${wa
              ? `<a href="${wa}" target="_blank" class="btn" style="background:#25D366;border-color:#25D366;color:#fff;flex-shrink:0;text-decoration:none;padding:8px 16px;font-size:13px;white-space:nowrap">Empujón</a>`
              : '<span style="font-size:11px;color:#666;flex-shrink:0">sin tel</span>'}
          </div>`;
        }).join('')}</div>`}
  `;
}

// ── Helpers compartidos: búsqueda de paciente en Medilink (panel admin) ──
async function gpMedilinkRut(rut){
  try{
    const res = await fetch('/api/medilink-proxy?tipo=rut&valor='+encodeURIComponent(rut));
    const j = await res.json();
    if(!j.encontrado) return null;
    const p = j.paciente;
    p._nombre = [p.nombre, p.apellido, p.apellido2].filter(Boolean).join(' ');
    p._rut = p.rut || rut;
    return p;
  }catch(e){ return null; }
}
async function gpTieneClave(rut){
  try{
    const res = await fetch('/api/auth?action=status', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({rut})});
    const j = await res.json();
    return !!j.registered;
  }catch(e){ return null; }
}

async function buscarParaReset(){
  const rut=(document.getElementById('ck-rut').value||'').trim();
  if(!rut) return;
  const box=document.getElementById('ck-res');
  box.innerHTML='<p style="font-size:12px;color:#888">Buscando…</p>';
  try{
    const res=await fetch('/api/medilink-proxy?tipo=rut&valor='+encodeURIComponent(rut));
    const j=await res.json();
    if(!j.encontrado){ box.innerHTML='<p style="font-size:13px;color:#ff6b6b">No se encontró ese RUT en Medilink.</p>'; return; }
    const p=j.paciente;
    const nombre=[p.nombre,p.apellido,p.apellido2].filter(Boolean).join(' ');
    const rutP=p.rut||rut;
    box.innerHTML=`<div style="display:flex;align-items:center;gap:10px;background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:12px">

    </div>
    <button class="btn btn-danger" style="margin-top:10px;width:100%" onclick="resetClaveAdmin('${rutP}', this.dataset.n)" data-n="${nombre.replace(/"/g,'')}">Resetear clave de este paciente</button>`;
  }catch(e){ box.innerHTML='<p style="font-size:13px;color:#ff6b6b">Error de conexión.</p>'; }
}
async function resetClaveAdmin(rut, nombre){
  if(!_adminPin){
    _adminPin=prompt('PIN de administrador para resetear claves:');
    if(!_adminPin) return;
  }
  if(!confirm(`¿Resetear la clave de ${nombre}?\n\nDeberá registrarse de nuevo y crear una clave nueva.`)) return;
  try{
    const res=await fetch('/api/auth?action=reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rut,pin:_adminPin})});
    const j=await res.json();
    if(j.ok){ alert('✓ Clave reseteada. El paciente ya puede registrarse de nuevo.'); }
    else if(j.reason==='pin'){ _adminPin=null; alert('PIN incorrecto. Vuelve a intentarlo.'); }
    else { alert('No se pudo resetear: '+(j.error||j.reason||'error')); }
  }catch(e){ alert('Error de conexión. Intenta nuevamente.'); }
}

async function filtrarPts(){
  const q = (document.getElementById('bq').value||'').trim();
  const fc = document.getElementById('fc').value;
  const fe = document.getElementById('fe').value;

  let query = db.from('pacientes').select('*').order('nombre').limit(200);

  if(q){
    // Mismo enfoque que notificaciones: ilike en nombre O rut O email O tel
    query = db.from('pacientes').select('*').order('nombre').limit(100)
      .or(`nombre.ilike.%${q}%,rut.ilike.%${q}%,email.ilike.%${q}%,tel.ilike.%${q}%`);
  }

  if(fc) query = query.eq('comuna', fc);

  const { data } = await query;
  let result = data || [];

  // Filtro por edad (client-side)
  if(fe){
    const [a,b] = fe.split('-').map(Number);
    result = result.filter(p => {
      const e = edad(p.nac);
      return e !== null && e >= a && e <= b;
    });
  }

  document.getElementById('pl').innerHTML = rowsPt(result);
  document.getElementById('pd').classList.add('hidden');
}

async function gTratoDetalle(){
  try {
    let rut = window._currentDetRut;
    if(!rut){
      const openForm = document.querySelector('[id^="form-trato-"][data-open="1"]');
      if(openForm) rut = openForm.dataset.rut;
    }
    if(!rut){ alert('Error: RUT no encontrado'); return; }
    window._currentDetRut = rut;
    const form = document.getElementById('form-trato-'+rut);
    if(!form){ alert('Error: formulario no encontrado'); return; }
    const fechaEl = form.querySelector('.qt-fecha');
    const proxEl  = form.querySelector('.qt-prox');
    const msgEl   = form.querySelector('.qt-msg');
    const fecha   = fechaEl ? fechaEl.value : '';
    const prox    = proxEl  ? proxEl.value||null : null;
    if(!fecha){
      if(msgEl){msgEl.className='er';msgEl.classList.remove('hidden');msgEl.textContent='Ingresa la fecha.';}
      return;
    }
    const items = form.querySelectorAll('.det-item');
    if(!items.length){
      if(msgEl){msgEl.className='er';msgEl.classList.remove('hidden');msgEl.textContent='Agrega al menos un tratamiento.';}
      return;
    }
    const tratos=[];
    let ok=true;
    items.forEach(item=>{
      const tipo = item.querySelector('select') ? item.querySelector('select').value : '';
      const nota = item.querySelector('textarea') ? item.querySelector('textarea').value.trim() : '';
      if(!tipo){ok=false;return;}
      tratos.push({paciente_rut:rut, fecha, tipo, nota, proximo:prox});
    });
    if(!ok){
      if(msgEl){msgEl.className='er';msgEl.classList.remove('hidden');msgEl.textContent='Selecciona el tipo en todos los tratamientos.';}
      return;
    }
    const {error} = await db.from('tratamientos').insert(tratos);
    if(error){
      if(msgEl){msgEl.className='er';msgEl.classList.remove('hidden');msgEl.textContent='Error: '+error.message;}
      return;
    }
    if(msgEl){msgEl.className='ok';msgEl.classList.remove('hidden');msgEl.textContent='✓ '+tratos.length+' tratamiento(s) guardado(s).';}
    setTimeout(()=>vDet(rut), 1200);
  } catch(e){
    alert('Error: '+e.message);
  }
}

function hFile(file){
  if(!file) return;
  const imsg=document.getElementById('imsg');
  if(!file.name.match(/\.(xlsx|csv)$/i)){imsg.className='er';imsg.classList.remove('hidden');imsg.textContent='Solo .xlsx o .csv';return;}
  const r=new FileReader();
  r.onload=async e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      S.imp=rows.map(r=>({
        nombre:String(r.nombre||r.Nombre||'').trim(),
        rut:String(r.rut||r.RUT||'').trim(),
        nac:String(r.fecha_nacimiento||r.nacimiento||'').trim(),
        sexo:String(r.sexo||r.Sexo||'').trim(),
        pais:String(r.cod_pais||r.pais||'+56').trim(),
        tel:String(r.telefono||r.Telefono||'').trim(),
        email:String(r.email||r.Email||'').trim(),
        comuna:String(r.comuna||r.Comuna||'').trim(),
        direccion:String(r.direccion||r.Dirección||'').trim()
      })).filter(p=>p.nombre&&p.rut);
      if(!S.imp.length){imsg.className='er';imsg.classList.remove('hidden');imsg.textContent='Sin filas válidas.';return;}
      const { data:existing } = await db.from('pacientes').select('rut');
      const existingRuts = new Set((existing||[]).map(p=>p.rut.replace(/\./g,'').toLowerCase()));
      const nv=S.imp.filter(p=>!existingRuts.has(p.rut.replace(/\./g,'').toLowerCase()));
      const dup=S.imp.length-nv.length;
      document.getElementById('pbody').innerHTML=`<p style="font-size:13px;color:#888;margin-bottom:10px"><strong style="color:#fff">${S.imp.length}</strong> leídos · <strong style="color:#6bcb77">${nv.length}</strong> nuevos · <strong style="color:#ff6b6b">${dup}</strong> duplicados</p>`+
        nv.slice(0,15).map(p=>`<div style="font-size:12px;padding:5px 8px;background:#2a2a2c;border-radius:8px;margin-bottom:4px"><strong style="color:#fff">${p.nombre}</strong> <span style="color:#666">${p.rut}</span></div>`).join('')+(nv.length>15?`<p style="font-size:11px;color:#666;margin-top:4px">...y ${nv.length-15} más</p>`:'');
      document.getElementById('pcard').style.display='block';
      imsg.classList.add('hidden');
      S._nvImport = nv;
    }catch(err){imsg.className='er';imsg.classList.remove('hidden');imsg.textContent='Error: '+err.message;}
  };r.readAsArrayBuffer(file);
}

function hDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)hFile(f);}

async function cImp(){
  const nv = S._nvImport||[];
  if(!nv.length){ alert('Sin pacientes nuevos.'); return; }
  const seen=new Set();
  const unique=nv.filter(p=>{const k=p.rut.replace(/\./g,'').toLowerCase();if(seen.has(k))return false;seen.add(k);return true;});
  let inserted=0,skipped=0;
  for(let i=0;i<unique.length;i+=50){
    const batch=unique.slice(i,i+50).map(p=>({
      rut:p.rut,nombre:p.nombre,nac:p.nac||null,apellido:p.nombre.split(/\s+/)[1]||'',
      sexo:p.sexo||null,pais:p.pais||'+56',tel:p.tel||null,
      email:p.email||null,comuna:p.comuna||null,direccion:p.direccion||null
    }));
    const {error}=await db.from('pacientes').insert(batch);
    if(error&&error.code==='23505'){
      for(const p of batch){
        const {error:e2}=await db.from('pacientes').insert(p);
        if(!e2)inserted++;else skipped++;
      }
    }else if(error){alert('Error: '+error.message);return;}
    else inserted+=batch.length;
  }
  alert('✓ '+inserted+' paciente(s) importados. '+skipped+' omitidos.');
  S.imp=[];S._nvImport=[];
  DT='pacientes';rDocPanel();
}

function fotoGrid(urls, names, onDelete){
  // Group by title (everything before the last -NUMBER part)
  const groups = {};
  const ETIQUETAS = ['antes','despues','control','resultado','general'];
  urls.forEach(function(url, i){
    const name = names[i];
    const noExt = name.replace(/\.[^.]+$/, '');
    const parts = noExt.split('-');
    const lastPart = parts[parts.length-1];
    const isTimestamp = /^\d{10,}$/.test(lastPart);
    const withoutTs = isTimestamp ? parts.slice(0,-1) : parts;
    const lastWord = withoutTs[withoutTs.length-1];
    const isEtiqueta = ETIQUETAS.indexOf(lastWord) >= 0;
    const etiqueta = isEtiqueta ? lastWord : 'general';
    const casoParts = isEtiqueta ? withoutTs.slice(0,-1) : withoutTs;
    const cleanTitle = casoParts.join(' ').replace(/[_]/g,' ').replace(/\s+/g,' ').trim() || 'General';
    if(!groups[cleanTitle]) groups[cleanTitle] = [];
    groups[cleanTitle].push({url:url, name:name, etiqueta:etiqueta, idx:i});
  });
  Object.keys(groups).forEach(function(k){
    groups[k].sort(function(a,b){
      return ETIQUETAS.indexOf(a.etiqueta) - ETIQUETAS.indexOf(b.etiqueta);
    });
  });

  let html = '';
  const groupKeys = Object.keys(groups);
  groupKeys.forEach(function(titulo){
    const items = groups[titulo];
    const groupUrls = items.map(function(x){ return x.url; });
    html += '<div style="margin-bottom:20px">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      + '<span style="font-size:18px">📁</span>'
      + '<div>'
      + '<p style="font-size:13px;color:#fff;font-weight:600;text-transform:capitalize">' + titulo + '</p>'
      + '<p style="font-size:11px;color:#666">' + items.length + ' foto' + (items.length>1?'s':'') + '</p>'
      + '</div>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">';
    items.forEach(function(item, gi){
      html += '<div style="position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1">'
        + '<img src="' + item.url + '" style="width:100%;height:100%;object-fit:cover;cursor:pointer" '
        + 'data-gurls="' + encodeURIComponent(JSON.stringify(groupUrls)) + '" data-gidx="' + gi + '" '
        + 'onclick="var gu=JSON.parse(decodeURIComponent(this.dataset.gurls));abrirVisor(gu,parseInt(this.dataset.gidx))">'
        + (onDelete ? '<button data-name="' + item.name + '" onclick="event.stopPropagation();' + onDelete + '(this.dataset.name)" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.75);border:none;color:#ff6b6b;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center">✕</button>' : '')
        + '</div>';
    });
    html += '</div></div>';
  });
  return html || '<p style="color:#666;font-size:13px">Sin fotos aún.</p>';
}

    db.storage.from('galeria-pacientes').list(rut, {limit:100, sortBy:{column:'created_at',order:'desc'}})
  ]);
  const genFotos = (gen||[]).filter(function(f){ return f.name!=='.emptyFolderPlaceholder'; });
  const privFotos = (priv||[]).filter(function(f){ return f.name!=='.emptyFolderPlaceholder'; });

  const genUrls = genFotos.map(function(f){ return SUPA_URL+'/storage/v1/object/public/galeria-general/'+f.name; });
  const genNames = genFotos.map(function(f){ return f.name; });

  let privUrls = [], privNames = [];
  if(privFotos.length){
    const paths = privFotos.map(function(f){ return rut+'/'+f.name; });
    const { data:signed } = await db.storage.from('galeria-pacientes').createSignedUrls(paths, 3600);
    privUrls = (signed||[]).map(function(s){ return s.signedUrl; });
    privNames = privFotos.map(function(f){ return f.name; });
  }

  el.innerHTML = '<div style="display:flex;flex-direction:column;gap:20px;padding-bottom:20px">'
    + '<div>'
    + '<p style="font-size:11px;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px">📸 Fotos del Consultorio</p>'
    + fotoGrid(genUrls, genNames, null)

    + '<div>'

    + '</div>'
    + visorHTML()
    + '</div>';

  setTimeout(function(){ initSwipe(document.getElementById('fs-viewer')); }, 300);

async function agregarTipo(){
  const nombre = document.getElementById('nt-nombre').value.trim();
  if(!nombre){ showMsg('nt-msg','er','Escriba el nombre del tratamiento.'); return; }
  const { data:max } = await db.from('tipos_tratamiento').select('orden').order('orden',{ascending:false}).limit(1);
  const orden = max&&max.length ? max[0].orden+1 : 1;
  const { error } = await db.from('tipos_tratamiento').insert({ nombre, orden });
  if(error){ showMsg('nt-msg','er', error.code==='23505'?'Ya existe ese tratamiento.':'Error: '+error.message); return; }
  showMsg('nt-msg','ok','✓ Tratamiento "'+nombre+'" agregado.');
  setTimeout(()=>{ DT='tipos'; rDocPanel(); }, 1200);
}

function editarTipo(id){
  document.getElementById('tipo-text-'+id).style.display='none';
  document.getElementById('tipo-edit-'+id).style.display='block';
  document.getElementById('btn-edit-'+id).style.display='none';
  document.getElementById('btn-save-'+id).style.display='block';
  document.getElementById('tipo-edit-'+id).focus();
}

async function guardarTipo(id){
  const nombre = document.getElementById('tipo-edit-'+id).value.trim();
  if(!nombre) return;
  const { error } = await db.from('tipos_tratamiento').update({ nombre }).eq('id',id);
  if(error){ alert('Error al guardar: '+error.message); return; }
  DT='tipos'; rDocPanel();
}

async function toggleTipo(id, activo){
  await db.from('tipos_tratamiento').update({ activo: !activo }).eq('id',id);
  DT='tipos'; rDocPanel();
}

async function eliminarTipo(id){
  if(!confirm('¿Eliminar este tipo de tratamiento?')) return;
  await db.from('tipos_tratamiento').delete().eq('id',id);
  DT='tipos'; rDocPanel();
}

async function filtrarHistorial(){
  const q = (document.getElementById('hist-search')?.value||'').trim().toLowerCase().replace(/\./g,'').replace(/-/g,'');
  const lista = document.getElementById('hist-lista');
  const info = document.getElementById('hist-results-info');
  if(!lista) return;
  const items = lista.querySelectorAll('.card-light');
  let visible = 0;
  items.forEach(item=>{
    const dest = (item.dataset.dest||'').toLowerCase().replace(/\./g,'').replace(/-/g,'');
    const show = !q || dest.includes(q);
    item.style.display = show ? '' : 'none';
    if(show) visible++;
  });

async function enviarWapp(){
  const rut = document.getElementById('notif-pt-rut').value;
  const txt = document.getElementById('ntx').value.trim();
  if(!rut){ showMsg('nmg2','er','Selecciona un paciente primero.'); return; }
  if(!txt){ showMsg('nmg2','er','Escribe un mensaje.'); return; }

  const telRaw = window._notifTel || '';
  if(!telRaw){ showMsg('nmg2','er','Este paciente no tiene teléfono registrado en Medilink.'); return; }
  const nombrePt = window._notifNombre || '';
  const fullTel = telRaw.replace(/\D/g,'');

  const btn = document.getElementById('btn-wapp');
  if(btn){ btn.textContent='Enviando...'; btn.disabled=true; }
  showMsg('nmg2','ok','⏳ Enviando mensaje...');

  try {
    const resp = await fetch('/api/whatsapp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ number: fullTel, body: txt, name: nombrePt })
    });
    const result = await resp.json();
    if(!resp.ok){
      showMsg('nmg2','er','Error: ' + (result.error || resp.status));
      if(btn){ btn.textContent='Enviar por WhatsApp'; btn.disabled=false; }
      return;
    }
    await db.from('notificaciones').insert({ dest:rut, tipo:'WhatsApp', txt, fecha:today() });
    showMsg('nmg2','ok','✅ Mensaje enviado por WhatsApp y guardado en historial.');
  } catch(err) {
    showMsg('nmg2','er','Error de conexión: ' + err.message);
  }
  if(btn){ btn.textContent='Enviar por WhatsApp'; btn.disabled=false; }
}

let _gpNotifTimer = null;
function filtrarPtsNotif(){
  const q = document.getElementById('notif-pt-search').value.trim();

  clearTimeout(_gpNotifTimer);
  res.style.display='block';
  res.innerHTML='<div style="padding:10px 14px;font-size:12px;color:#888">Buscando en Medilink…</div>';
  _gpNotifTimer = setTimeout(async ()=>{

async function gNotif(){
  const txt = document.getElementById('ntx').value.trim();
  if(!txt){ showMsg('nmg2','er','Escriba un mensaje.'); return; }
  const tipo = document.getElementById('dest-tipo').value;
  const tipoAviso = document.getElementById('nti').value;
  let dest = 'todos';
  let destLabel = 'todos';

  if(tipo==='uno'){
    const rut = document.getElementById('notif-pt-rut').value;
    if(!rut){ showMsg('nmg2','er','Selecciona un paciente.'); return; }
    dest = rut;
  } else if(tipo==='comuna'){
    const comuna = document.getElementById('notif-comuna').value;
    if(!comuna){ showMsg('nmg2','er','Selecciona una comuna.'); return; }
    dest = 'comuna:'+comuna;
  } else if(tipo==='sexo'){
    const sexo = document.getElementById('notif-sexo').value;
    if(!sexo){ showMsg('nmg2','er','Selecciona el sexo.'); return; }
    dest = 'sexo:'+sexo;
  } else if(tipo==='edad'){
    const min = document.getElementById('notif-edad-min').value;

    if(!min||!max){ showMsg('nmg2','er','Ingresa rango de edad.'); return; }

  } else if(tipo==='tratamiento'){
    const trat = document.getElementById('notif-tratamiento').value;
    if(!trat){ showMsg('nmg2','er','Selecciona un tratamiento.'); return; }
    dest = 'trat:'+trat;
  } else if(tipo==='sin_tratamiento'){
    dest = 'sin_trat';
  }

  const { error } = await db.from('notificaciones').insert({ dest, tipo:tipoAviso, txt, fecha:today() });

async function tStats(el){
  // Cargar pacientes en páginas para superar el límite de 1000 de Supabase
  const [
    { count:femCount },
    { count:homCount },
    { count:emailCount },
    { count:totCount },
    { data:trts }
  ] = await Promise.all([
    db.from('pacientes').select('*', {count:'exact', head:true}).eq('sexo','Femenino'),
    db.from('pacientes').select('*', {count:'exact', head:true}).eq('sexo','Masculino'),
    db.from('pacientes').select('*', {count:'exact', head:true}).not('email','is',null).neq('email',''),
    db.from('pacientes').select('*', {count:'exact', head:true}),
    db.from('tratamientos').select('tipo,paciente_rut').limit(50000)
  ]);

  // Paginar pacientes para obtener nac, sexo, comuna de TODOS
  let allPts = [];
  let from = 0;
  const pageSize = 1000;
  while(true){
    const { data:page, error } = await db.from('pacientes')
      .select('nac,sexo,comuna,email')
      .range(from, from+pageSize-1);
    if(error || !page || page.length === 0) break;
    allPts = allPts.concat(page);
    if(page.length < pageSize) break;
    from += pageSize;
  }

  const data=allPts, tot=totCount||data.length;
  // Use exact counts from DB, not from limited data
  const fem = femCount || data.filter(p=>p.sexo==='Femenino').length;
  const hom = homCount || data.filter(p=>p.sexo==='Masculino').length;
  const ce = emailCount || data.filter(p=>p.email).length;
  const edades=data.map(p=>edad(p.nac)).filter(e=>e!==null);
  const pr=edades.length?Math.round(edades.reduce((a,b)=>a+b,0)/edades.length):0;
  const totalT=(trts||[]).length;
  const pc={};data.forEach(p=>{
    if(!p.comuna) return;
    const c=normalizarComuna(p.comuna);
    if(c) pc[c]=(pc[c]||0)+1;
    // else: valor inválido, se ignora en estadísticas
  });
  const cs=Object.entries(pc).sort((a,b)=>b[1]-a[1]);
  const rg=[['Hasta 30',0],['31–45',0],['46–60',0],['Más de 60',0]];
  data.forEach(p=>{const e=edad(p.nac);if(e===null)return;if(e<=30)rg[0][1]++;else if(e<=45)rg[1][1]++;else if(e<=60)rg[2][1]++;else rg[3][1]++;});
  const totConEdad=rg.reduce((a,b)=>a+b[1],0);
  const tt={};(trts||[]).forEach(t=>{tt[t.tipo]=(tt[t.tipo]||0)+1;});
  const ts=Object.entries(tt).sort((a,b)=>b[1]-a[1]).slice(0,6);
  // hom already computed above
  const conTrat = new Set((trts||[]).map(t=>t.paciente_rut)).size;
  const { count:notifTot } = await db.from('notificaciones').select('*',{count:'exact',head:true});
  el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
    <div class="met"><div class="mv">${tot}</div><div class="ml">Total</div></div>
    <div class="met"><div class="mv">${pr}</div><div class="ml">Edad prom.</div></div>
    <div class="met"><div class="mv">${fem}</div><div class="ml">Mujeres</div></div>
    <div class="met"><div class="mv">${hom}</div><div class="ml">Hombres</div></div>
    <div class="met"><div class="mv">${ce}</div><div class="ml">Con email</div></div>
    <div class="met"><div class="mv">${conTrat}</div><div class="ml">Con trat.</div></div>
    <div class="met"><div class="mv">${totalT}</div><div class="ml">Total trats.</div></div>
    <div class="met"><div class="mv">${notifTot||0}</div><div class="ml">Avisos</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
    <div class="card"><p style="font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Por comuna</p>
      ${cs.map(([c,n])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #222;font-size:12px"><span class="tag ${ctag(c)}">${c}</span><span style="font-weight:600;color:#fff">${n}</span></div>`).join('')}
    </div>
    <div class="card"><p style="font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Por edad</p>
      ${rg.map(([r,n])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#888">${r}</span><span style="font-weight:600;color:#fff">${n}</span></div><div class="bar"><div class="bar-fill" style="width:${totConEdad?Math.round(n/totConEdad*100):0}%"></div></div></div>`).join('')}
    </div>
    <div class="card"><p style="font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Más frecuentes</p>
      ${ts.map(([t,n])=>`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:#aaa">${t.length>22?t.slice(0,22)+'…':t}</span><span style="font-weight:600;color:#fff">${n}</span></div><div class="bar"><div class="bar-fill" style="width:${Math.round(n/(ts[0]?ts[0][1]:1)*100)}%"></div></div></div>`).join('')}
    </div>
  </div>`;
}

// Restore session on app load - valida el token de confianza (6 meses) en el backend
async function restoreSession() {
  let saved=null;
  try{ saved = localStorage.getItem('gp_session'); }catch(e){}
  if(saved) {
    try {
      const sess = JSON.parse(saved);
      if(sess && sess.token) {
        const r = await authApi('session', { token: sess.token });
        if(r.ok && r.paciente){
          S.pt = r.paciente;
          S.scr = 'ptd';
          render();
          return;
        }
      }
    } catch(e) {}
    try{ localStorage.removeItem('gp_session'); }catch(e){}
  }
  render();
}

  el.innerHTML=`<div class="card" style="max-width:500px;display:flex;flex-direction:column;gap:13px">
    <p style="font-size:11px;color:#666;letter-spacing:1.5px;text-transform:uppercase">Registrar Tratamiento</p>
    <div>
      <label class="lbl">Buscar paciente *</label>
      <div style="position:relative">
        <input id="pt-search" class="inp" placeholder="RUT del paciente (ej: 12345678-9)" oninput="filtrarPtsTrato()" autocomplete="off" style="padding-right:36px">
        <span id="pt-clear" onclick="clearPtTrato()" style="display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;font-size:18px;line-height:1">✕</span>
      </div>
      <div id="pt-results" style="display:none;background:#2c2c2e;border:1px solid #3a3a3c;border-radius:8px;margin-top:4px;max-height:200px;overflow-y:auto"></div>
      <input type="hidden" id="tp" value="">
      <div id="pt-selected" style="display:none"></div>
    </div>
    <div class="g2">
      <div><label class="lbl">Fecha *</label><input id="tf" class="inp" type="date" value="${today()}"></div>
      <div><label class="lbl">Próximo control</label><input id="tpx" class="inp" type="date"></div>
    </div>
    <div id="tratos-lista-panel" style="display:flex;flex-direction:column;gap:8px">
      <div class="trato-item" style="background:#2c2c2e;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px">
        <p style="font-size:11px;color:#888">Tratamiento 1</p>
        <select class="sel trato-tipo"><option value="">Seleccionar tipo...</option>${(tipos||[]).map(t=>`<option>${t.nombre}</option>`).join('')}</select>
        <textarea class="ta trato-nota" rows="2" placeholder="Notas (opcional)..."></textarea>
      </div>
    </div>
    <button type="button" class="btn" style="border-style:dashed;justify-content:center;color:#888" onclick="agregarItemTrato()">+ Agregar otro tratamiento</button>
    <div id="tmsg" class="hidden"></div>
    <button type="button" class="btn btn-white" onclick="registrarTodos()">✓ Registrar todos los tratamientos</button>
  </div>`;
}

function agregarItemTrato(){
  const lista = document.getElementById('tratos-lista-panel');
  if(!lista) return;
  const tipos = window._tiposTrato||[];
  const num = lista.querySelectorAll('.trato-item').length + 1;
  const itemId = 'trato-item-'+Date.now();
  const item = document.createElement('div');
  item.className='trato-item';
  item.id=itemId;
  item.style.cssText='background:#2c2c2e;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px';

  // Header with number and ✕
  const hdr = document.createElement('div');
  hdr.style.cssText='display:flex;justify-content:space-between;align-items:center';
  const lbl = document.createElement('p');
  lbl.style.cssText='font-size:11px;color:#888;margin:0';
  lbl.textContent='Tratamiento '+num;
  const xBtn = document.createElement('button');
  xBtn.type='button';
  xBtn.style.cssText='background:transparent;border:none;color:#ff6b6b;cursor:pointer;font-size:20px;line-height:1;padding:0 4px';
  xBtn.textContent='✕';
  xBtn.onclick=function(){
    document.getElementById(itemId).remove();
    // Renumber
    const lista2=document.getElementById('tratos-lista-panel');
    if(lista2) lista2.querySelectorAll('.trato-item p').forEach((p,i)=>{ p.textContent='Tratamiento '+(i+1); });
  };
  hdr.appendChild(lbl);
  hdr.appendChild(xBtn);
  item.appendChild(hdr);

  // Select
  const sel = document.createElement('select');
  sel.className='sel trato-tipo';
  let opts='<option value="">Seleccionar tipo...</option>';
  tipos.forEach(t=>{ opts+='<option>'+t.nombre+'</option>'; });
  sel.innerHTML=opts;
  item.appendChild(sel);

  // Textarea
  const ta = document.createElement('textarea');
  ta.className='ta trato-nota';
  ta.rows=2;
  ta.placeholder='Notas (opcional)...';
  item.appendChild(ta);

  lista.appendChild(item);
}


async function registrarTodos(){
  try {
    const tpEl    = document.getElementById('tp');
    const tfEl    = document.getElementById('tf');
    const tpxEl   = document.getElementById('tpx');
    const msgEl   = document.getElementById('tmsg');
    const listaEl = document.getElementById('tratos-lista-panel');
    const rut     = tpEl   ? tpEl.value.trim()  : '';
    const fecha   = tfEl   ? tfEl.value.trim()  : '';
    const prox    = tpxEl  ? tpxEl.value||null  : null;
    if(!rut){
      if(msgEl){msgEl.className='er';msgEl.classList.remove('hidden');msgEl.textContent='Selecciona un paciente primero.';}
      return;
    }
    if(!fecha){
      if(msgEl){msgEl.className='er';msgEl.classList.remove('hidden');msgEl.textContent='Ingresa la fecha.';}
      return;
    }
    if(!listaEl){ alert('Error: lista no encontrada.'); return; }
    const items = listaEl.querySelectorAll('.trato-item');
    const tratos = [];
    let ok = true;
    items.forEach(item => {
      const tipoEl = item.querySelector('.trato-tipo');
      const notaEl = item.querySelector('.trato-nota');
      const tipo   = tipoEl ? tipoEl.value : '';
      const nota   = notaEl ? notaEl.value.trim() : '';
      if(!tipo){ ok = false; return; }
      tratos.push({ paciente_rut:rut, fecha, tipo, nota, proximo:prox });
    });
    if(!ok){
      if(msgEl){msgEl.className='er';msgEl.classList.remove('hidden');msgEl.textContent='Selecciona el tipo en todos los tratamientos.';}
      return;
    }
    if(!tratos.length){
      if(msgEl){msgEl.className='er';msgEl.classList.remove('hidden');msgEl.textContent='Agrega al menos un tratamiento.';}
      return;
    }
    const { error } = await db.from('tratamientos').insert(tratos);
    if(error){
      if(msgEl){msgEl.className='er';msgEl.classList.remove('hidden');msgEl.textContent='Error: '+error.message;}
      return;
    }
    if(msgEl){msgEl.className='ok';msgEl.classList.remove('hidden');msgEl.textContent='✓ '+tratos.length+' tratamiento(s) registrado(s).';}
    setTimeout(()=>{ DT='trato'; rDocPanel(); }, 1400);
  } catch(e){ alert('Error: '+e.message); }
}

restoreSession();
</script>
